{% load static %}
<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>ورود رسمی | Deco B2B</title>
    <link rel="stylesheet" href="https://lib.arvancloud.ir/font-awesome/6.3.0/css/all.css">
    <link rel="stylesheet" href="{% static 'css/fonts.css' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.96);
            --glass-border: rgba(99, 102, 241, 0.2);
            --glass-shadow: 0 30px 45px -20px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            --blur-amount: 18px;
            --primary-gradient: linear-gradient(105deg, #1e3a5f 0%, #2a5f8a 100%);
            --radius-card: 2rem;
        }

        body {
            font-family: 'IRANYekan', system-ui, -apple-system, 'Vazirmatn', sans-serif;
            direction: rtl;
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 20%, #d9e6f2 0%, #bdd4e7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }

        .glass-auth-card {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border-radius: var(--radius-card);
            box-shadow: var(--glass-shadow);
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 2rem 1.8rem 2.2rem;
            position: relative;
            z-index: 4;
            transform: translateZ(0);
            will-change: transform;
        }

        @media (max-width: 560px) {
            .glass-auth-card {
                padding: 1.6rem 1.3rem 1.8rem;
                border-radius: 1.8rem;
            }
        }

        .brand {
            display: flex;
            justify-content: center;
            margin-bottom: 0.8rem;
        }
        .logo-circle {
            background: var(--primary-gradient);
            width: 70px;
            height: 70px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 18px -8px rgba(0, 32, 64, 0.25);
            flex-shrink: 0;
        }
        .logo-circle svg {
            width: 38px;
            height: 38px;
            stroke: white;
            stroke-width: 1.5;
            fill: none;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .auth-header h1 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(130deg, #0b3b4f, #1a5878);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.3rem;
        }
        .auth-header p {
            color: #2c6e8f;
            font-size: 0.85rem;
            font-weight: 500;
            background: rgba(235, 245, 255, 0.7);
            display: inline-block;
            padding: 0.3rem 1.4rem;
            border-radius: 60px;
        }

        .form-group {

            margin-bottom: 1.6rem;
            position: relative;
            
        }

        .input-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.65rem;
            font-weight: 700;
            font-size: 0.85rem;
            color: #144e6b;
        }
        .input-label svg {
            width: 18px;
            height: 18px;
            stroke: #2c7da0;
            stroke-width: 1.8;
            flex-shrink: 0;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            direction: ltr;
        }

        .auth-input {
            width: 100%;
            padding: 0.85rem 1.2rem 0.85rem 1.2rem;
            font-size: 1.1rem;
            font-family: 'Vazirmatn', monospace;
            border: none;
            border-bottom: 2.5px solid #d0dce6;
            border-radius: 0;
            background: transparent;
            transition: border-color 0.3s ease, background 0.3s ease;
            text-align: center;
            direction: ltr;
            font-weight: 600;
            color: #0c2c3b;
            letter-spacing: 2px;
            outline: none;
            box-sizing: border-box;
        }
        .auth-input:focus {
            border-bottom-color: #2c7da0;
            border-bottom-width: 3px;
        }
        .auth-input::placeholder {
            color: #a0b8c8;
            font-weight: 500;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        .auth-input.error-input {
            border-bottom-color: #dc3545 !important;
            border-bottom-width: 3px !important;
            background: rgba(220, 53, 69, 0.03) !important;
        }

        .auth-input.valid-input {
            border-bottom-color: #28a745 !important;
            border-bottom-width: 3px !important;
            background: rgba(40, 167, 69, 0.02) !important;
        }

        /* ===== فضای ثابت بدون حرکت ===== */
        .live-feedback {
            margin-top: 6px;
            font-weight: 600;
            font-size: 0.75rem;
            text-align: center;
            height: 28px; /* ارتفاع ثابت */
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            position: relative;
        }

        .feedback-content {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.2rem 1rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.75rem;
            transition: opacity 0.25s ease, transform 0.25s ease;
            transform: translateZ(0);
            will-change: transform;
            opacity: 0; /* مخفی پیش‌فرض */
            transform: scale(0.95);
            pointer-events: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            white-space: nowrap;
        }

        .feedback-content.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .valid-feedback {
            color: #1c6e43;
            background: #e8f5ee;
            border: 1.5px solid #28a745;
            box-shadow: 0 1px 6px rgba(40, 167, 69, 0.08);
        }

        .invalid-feedback {
            color: #dc3545;
            background: #fff5f5;
            border: 1.5px solid #dc3545;
            box-shadow: 0 1px 6px rgba(220, 53, 69, 0.08);
        }

        /* ===== ارور لیست هم ثابت ===== */
        .error-list {
            list-style: none;
            margin-top: 6px;
            text-align: center;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .error-list li {
            background: #fff5f5;
            color: #dc3545;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 1.2rem;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1.5px solid #dc3545;
            box-shadow: 0 1px 6px rgba(220, 53, 69, 0.08);
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.25s ease, transform 0.25s ease;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            white-space: nowrap;
        }
        .error-list li.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary-gradient);
            border: none;
            padding: 0.9rem 1rem;
            border-radius: 80px;
            font-size: 1rem;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 8px 20px -8px rgba(28, 75, 100, 0.5);
            font-family: 'IRANYekan', 'Vazirmatn', sans-serif;
            margin-top: 0.3rem;
            transform: translateZ(0);
            will-change: transform;
        }
        .btn-submit:active {
            transform: scale(0.97);
        }
        .btn-submit:disabled {
            opacity: 0.75;
            cursor: wait;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .terms-note {
            text-align: center;
            font-size: 0.65rem;
            color: #526f82;
            margin-top: 1.2rem;
            border-top: 1px solid rgba(150, 185, 200, 0.3);
            padding-top: 1rem;
        }
        .terms-note a {
            color: #1e6f8f;
            text-decoration: none;
            font-weight: 700;
        }

        @media (max-width: 480px) {
            .glass-auth-card {
                padding: 1.3rem 1rem 1.5rem;
            }
            .auth-input {
                font-size: 1rem;
                padding: 0.75rem 1rem 0.75rem 1rem;
                letter-spacing: 1.5px;
            }
            .auth-input::placeholder {
                font-size: 0.95rem;
            }
            .live-feedback {
                height: 24px;
                font-size: 0.7rem;
                margin-top: 4px;
            }
            .feedback-content {
                font-size: 0.7rem;
                padding: 0.15rem 0.8rem;
            }
            .error-list {
                height: 0px;
            }
            .error-list li {
                font-size: 0.7rem;
                padding: 0.15rem 1rem;
            }
            .btn-submit {
                padding: 0.8rem 1rem;
                font-size: 0.9rem;
                margin-top: 0.2rem;
            }
            .terms-note {
                margin-top: 1rem;
                padding-top: 0.8rem;
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>

<div class="glass-auth-card">
    <div class="brand">
        <div class="logo-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <path d="M3 9.5L12 4L21 9.5L12 15L3 9.5Z" />
                <path d="M5 11.5V16.5L12 20.5L19 16.5V11.5" />
                <path d="M12 15V20" />
                <circle cx="12" cy="8" r="1.5" fill="white" stroke="white"/>
            </svg>
        </div>
    </div>
    <div class="auth-header">
        <h1>Deco B2B</h1>
        <p>پلتفرم هوشمند B2B</p>
    </div>

    <form method="post" action="{% url 'account:send_mobile' %}" id="authForm" novalidate>
        {% csrf_token %}

        <div class="form-group" id="mobileGroup">
            <div class="input-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2" stroke="currentColor" fill="none"/>
                    <line x1="12" y1="18" x2="12" y2="18" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span>شماره همراه مدیر</span>
            </div>
            <div class="input-wrapper">
                <input type="tel"
                       name="mobileNumber"
                       id="id_mobileNumber"
                       class="auth-input"
                       maxlength="11"
                       minlength="11"
                       placeholder="0912 345 6789"
                       inputmode="numeric"
                       autocomplete="tel"
                       value=""
                       aria-describedby="mobileHelp">
            </div>
            <div id="liveValidation" class="live-feedback"></div>
            <div id="errorContainer" class="error-list"></div>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">
            <span>دریافت کد تایید</span>
            <i class="fa-regular fa-paper-plane"></i>
        </button>
        <div class="terms-note">
            ورود به منزله پذیرش <a href="#">قوانین دکو</a> و <a href="#">حریم خصوصی</a> است.
        </div>
    </form>
</div>

<script>
    (function() {
        const mobileInput = document.getElementById('id_mobileNumber');
        const submitBtn = document.getElementById('submitBtn');
        const form = document.getElementById('authForm');
        const liveFeedback = document.getElementById('liveValidation');
        const errorContainer = document.getElementById('errorContainer');

        function normalizeMobileDigits(value) {
            return value.replace(/\D/g, '').slice(0, 11);
        }

        function isValidIranMobile(digits) {
            if (digits.length === 11 && digits.startsWith('09')) {
                return /^09[0-9]{9}$/.test(digits);
            }
            if (digits.length === 10 && digits.startsWith('9')) {
                return /^9[0-9]{9}$/.test(digits);
            }
            return false;
        }

        function getFinalMobile(digits) {
            if (digits.length === 10 && digits.startsWith('9')) {
                return '0' + digits;
            }
            if (digits.length === 11 && digits.startsWith('09')) {
                return digits;
            }
            return digits;
        }

        function updateLiveValidationUI() {
            let raw = mobileInput.value;
            let digits = normalizeMobileDigits(raw);

            if (raw !== digits) {
                mobileInput.value = digits;
            }

            const isValid = isValidIranMobile(digits);
            mobileInput.classList.remove('error-input', 'valid-input');

            // حذف همه محتواهای قبلی
            liveFeedback.innerHTML = '';
            errorContainer.innerHTML = '';

            if (digits.length === 0) {
                mobileInput.style.borderBottomColor = '#d0dce6';
                return;
            }

            if (!isValid) {
                let message = '';
                if (digits.length > 0 && digits.length < 10) {
                    message = '⚠️ شماره ناقص است';
                } else if (digits.length === 10 && !digits.startsWith('9')) {
                    message = '⚠️ باید با 9 شروع شود';
                } else if (digits.length === 11 && !digits.startsWith('09')) {
                    message = '⚠️ باید با 09 شروع شود';
                } else {
                    message = '📱 شماره نامعتبر';
                }

                const span = document.createElement('span');
                span.className = 'feedback-content invalid-feedback show';
                span.innerHTML = `<i class="fa-regular fa-circle-xmark" style="font-size:0.8rem;"></i> ${message}`;
                liveFeedback.appendChild(span);

                mobileInput.classList.add('error-input');
                mobileInput.style.borderBottomColor = '#dc3545';

            } else {
                let displayMsg = '✓ شماره همراه معتبر';
                if (digits.length === 10 && digits.startsWith('9')) {
                    displayMsg = '✓ معتبر (0' + digits + ')';
                }

                const span = document.createElement('span');
                span.className = 'feedback-content valid-feedback show';
                span.innerHTML = `<i class="fa-regular fa-circle-check" style="font-size:0.8rem;"></i> ${displayMsg}`;
                liveFeedback.appendChild(span);

                mobileInput.classList.add('valid-input');
                mobileInput.style.borderBottomColor = '#28a745';
            }
        }

        function showError(message) {
            errorContainer.innerHTML = '';
            const li = document.createElement('li');
            li.className = 'show';
            li.innerHTML = `<i class="fa-regular fa-circle-xmark"></i> ${message}`;
            errorContainer.appendChild(li);
        }

        function autoCorrectOnBlur() {
            let digits = normalizeMobileDigits(mobileInput.value);
            if (digits.length === 10 && digits.startsWith('9')) {
                mobileInput.value = '0' + digits;
                updateLiveValidationUI();
            } else {
                mobileInput.value = digits;
                updateLiveValidationUI();
            }
        }

        async function handleFormSubmit(e) {
            e.preventDefault();

            errorContainer.innerHTML = '';

            let rawDigits = normalizeMobileDigits(mobileInput.value);

            if (!isValidIranMobile(rawDigits)) {
                showError('شماره موبایل صحیح نیست. مثال: 09123456789');
                mobileInput.classList.add('error-input');
                mobileInput.style.borderBottomColor = '#dc3545';
                return;
            }

            let finalMobileNumber = getFinalMobile(rawDigits);

            const originalContent = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="spinner"></span> <span>ارسال کد ...</span>`;

            let mobileField = document.querySelector('input[name="mobileNumber"]');
            if (!mobileField || mobileField === mobileInput) {
                let hiddenMobile = document.createElement('input');
                hiddenMobile.type = 'hidden';
                hiddenMobile.name = 'mobileNumber';
                hiddenMobile.value = finalMobileNumber;
                form.appendChild(hiddenMobile);
                mobileInput.setAttribute('name', 'mobile_display');
            } else {
                mobileField.value = finalMobileNumber;
            }

            try {
                form.submit();
            } catch (err) {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalContent;
                showError('خطا در ارتباط، دوباره تلاش کنید');
            }
        }

        // ===== رویدادها =====
        mobileInput.addEventListener('input', function() {
            let val = mobileInput.value;
            let cleaned = val.replace(/\D/g, '').slice(0, 11);

            if (cleaned !== val) {
                const cursorPos = mobileInput.selectionStart;
                mobileInput.value = cleaned;
                if (cursorPos) {
                    let newPos = cursorPos - (val.length - cleaned.length);
                    if (newPos < 0) newPos = 0;
                    if (newPos > cleaned.length) newPos = cleaned.length;
                    mobileInput.setSelectionRange(newPos, newPos);
                }
            }

            updateLiveValidationUI();
        });

        mobileInput.addEventListener('blur', autoCorrectOnBlur);

        form.addEventListener('submit', handleFormSubmit);

        // مقدار اولیه
        if (mobileInput.value) {
            let cleaned = mobileInput.value.replace(/\D/g, '').slice(0, 11);
            mobileInput.value = cleaned;
            updateLiveValidationUI();
        }
    })();
</script>
</body>
</html>
