<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>در انتظار تأیید مدیر</title>
  <style>
    /* reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #0b0e1a 0%, #1a1f2f 100%);
      font-family: 'Segoe UI', 'Tahoma', system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
      margin: 0;
    }

    /* کارت اصلی — بدون هیچ CDN، همه چیز دست‌ساز */
    .waiting-card {
      max-width: 600px;
      width: 100%;
      background: rgba(22, 28, 46, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 3.5rem 3.5rem 3rem 3rem;
      padding: 3rem 2.5rem 3.2rem;
      box-shadow:
        0 30px 50px rgba(0, 0, 0, 0.7),
        inset 0 1px 2px rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.04);
      transition: all 0.2s ease;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* افکت حاشیه‌ی نرم (بدون CDN) */
    .waiting-card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(135deg, rgba(255, 215, 100, 0.2), transparent 40%, transparent 60%, rgba(100, 180, 255, 0.15));
      border-radius: 3.6rem 3.6rem 3.2rem 3.2rem;
      z-index: -1;
      filter: blur(6px);
    }

    /* آیکون ساعت / چرخ‌دنده — انیمیشن خاص (بدون CDN) */
    .icon-gear {
      display: inline-block;
      font-size: 4.8rem;
      line-height: 1;
      margin-bottom: 1rem;
      color: #f5e7c8;
      text-shadow: 0 0 20px rgba(255, 215, 100, 0.3);
      animation: rotateGear 4.2s cubic-bezier(0.45, 0.05, 0.2, 0.99) infinite;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.5));
      transform-origin: center;
      display: inline-block;
      transition: transform 0.1s;
    }

    @keyframes rotateGear {
      0% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(90deg) scale(1.08); }
      50% { transform: rotate(180deg) scale(1); }
      75% { transform: rotate(270deg) scale(1.06); }
      100% { transform: rotate(360deg) scale(1); }
    }

    /* عنوان اصلی */
    .waiting-card h1 {
      font-size: 2.6rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #f2efe6;
      margin: 0.5rem 0 0.8rem 0;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
      word-break: break-word;
    }

    .waiting-card h1 small {
      display: block;
      font-size: 1rem;
      font-weight: 300;
      color: #b9c4d9;
      margin-top: 0.5rem;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    /* خط زیر عنوان (دکوراتیو) */
    .divider {
      width: 100px;
      height: 2.5px;
      margin: 0.8rem auto 1.8rem;
      background: linear-gradient(90deg, transparent, #e9d6a4, #b7a77b, #e9d6a4, transparent);
      border-radius: 10px;
      opacity: 0.7;
    }

    /* متن توضیح */
    .waiting-card p {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #d3dbe9;
      margin: 1rem 0 1.8rem 0;
      font-weight: 300;
      background: rgba(0, 0, 0, 0.15);
      padding: 0.8rem 1.2rem;
      border-radius: 60px;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 255, 255, 0.02);
      display: inline-block;
    }

    /* نوار بارگذاری (کاملاً دست‌ساز، بدون CDN) */
    .progress-track {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      margin: 1.8rem 0 2.5rem 0;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      width: 30%;
      height: 100%;
      background: linear-gradient(90deg, #f5d78c, #eac784, #f5d78c);
      background-size: 200% 100%;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255, 215, 100, 0.3);
      animation:
        shimmer 2.8s ease-in-out infinite,
        moveFill 5.6s cubic-bezier(0.25, 0.1, 0.25, 1) infinite alternate;
      transition: width 0.2s;
    }

    @keyframes shimmer {
      0% { background-position: 0% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes moveFill {
      0% { width: 18%; }
      50% { width: 65%; }
      100% { width: 38%; }
    }

    /* نقطه‌های ریتمیک (انیمیشن خاص) */
    .dots-container {
      display: flex;
      justify-content: center;
      gap: 0.9rem;
      margin: 1.2rem 0 0.8rem;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e6d4b0;
      box-shadow: 0 0 12px rgba(230, 212, 176, 0.3);
      animation: dotPulse 2.1s ease-in-out infinite both;
    }

    .dot:nth-child(1) { animation-delay: 0s; background: #f5e2b0; }
    .dot:nth-child(2) { animation-delay: 0.3s; background: #dcc9a0; }
    .dot:nth-child(3) { animation-delay: 0.6s; background: #c2b088; }
    .dot:nth-child(4) { animation-delay: 0.9s; background: #e8d8b5; }
    .dot:nth-child(5) { animation-delay: 1.2s; background: #f0ddb0; }

    @keyframes dotPulse {
      0%, 80%, 100% {
        transform: scale(0.6);
        opacity: 0.3;
        box-shadow: 0 0 4px rgba(255, 215, 100, 0.1);
      }
      40% {
        transform: scale(1.3);
        opacity: 1;
        box-shadow: 0 0 30px rgba(255, 215, 100, 0.6);
      }
    }

    /* دکمه یا وضعیت (فقط نمایشی) */
    .status-badge {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.5rem 1.8rem;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 215, 100, 0.15);
      color: #b9c4d9;
      font-size: 0.85rem;
      letter-spacing: 1.5px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: all 0.3s;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
    }

    .status-badge i {
      display: inline-block;
      animation: blink 1.8s infinite;
      font-style: normal;
      margin-left: 8px;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; text-shadow: 0 0 12px #f5d78c; }
    }

    /* ریسپانسیو */
    @media (max-width: 480px) {
      .waiting-card {
        padding: 2rem 1.5rem 2.2rem;
        border-radius: 2.5rem;
      }
      .waiting-card h1 {
        font-size: 2rem;
      }
      .icon-gear {
        font-size: 3.8rem;
      }
      .dots-container {
        gap: 0.6rem;
      }
      .dot {
        width: 11px;
        height: 11px;
      }
    }

    /* جلوگیری از خروج از کادر */
    .waiting-card * {
      max-width: 100%;
    }

    /* یک افکت پس‌زمینهٔ نرم (دایره‌های محو) بدون CDN */
    .waiting-card::after {
      content: '⏳';
      position: absolute;
      font-size: 18rem;
      opacity: 0.015;
      bottom: -3rem;
      left: -3rem;
      transform: rotate(20deg);
      pointer-events: none;
      font-family: 'Segoe UI', 'Tahoma', sans-serif;
    }

    /* نسخهٔ بدون عکس و آیکون‌های خارجی */
    .no-cdn {
      font-feature-settings: "ss02";
    }

    /* پشتیبانی از مرورگرهای قدیمی‌تر */
    .waiting-card {
      background: #1a1f2f; /* fallback */
    }
  </style>
</head>
<body>
  <div class="waiting-card no-cdn">

    <!-- چرخ‌دنده + انیمیشن خاص (حالت ساعت) -->
    <div class="icon-gear" aria-hidden="true">⚙️</div>

    <h1>
      صبر کنید تا از طرف مدیر تأیید شوید
      <small>درخواست شما در صف بررسی قرار دارد</small>
    </h1>

    <div class="divider"></div>

    <p>⏳ منتظر تأیید مدیر · لطفاً شکیبا باشید</p>

    <!-- نوار پیشرفت (انیمیشن خاص) -->
    <div class="progress-track">
      <div class="progress-fill" style="width: 30%;"></div>
    </div>

    <!-- نقطه‌های پویا (انیمیشن خاص) -->
    <div class="dots-container">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <!-- برچسب وضعیت (با انیمیشن) -->
    <div class="status-badge">
      <span>در انتظار تأیید</span>
      <i>●</i>
    </div>

    <!-- توضیح کوتاه (بدون CDN) -->
    <div style="margin-top: 2rem; font-size: 0.75rem; opacity: 0.25; letter-spacing: 0.5px; color: #b0bedb; border-top: 1px solid rgba(255,255,255,0.02); padding-top: 1.2rem; direction: ltr;">
      <span style="display: inline-block; animation: blink 3s infinite;">⏳</span>
      <span style="font-family: monospace;">· تایید خودکار ·</span>
    </div>
  </div>
</body>
</html>
