<style>
/* ========== RESET & BASE ========== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

.main-header {
    background: white;
    box-shadow: 0 2px 15px rgba(0,0,0,0.08);
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1000;
    gap: 20px;
    flex-wrap: wrap;
}

.header-right-side {

    gap: 20px;

}

.header-logo {

    align-items: center;
    gap: 10px;
}

.logo-icon-side img {

    border-radius: 8px;
}

.header-logo-text {
    display: flex;
    flex-direction: column;
}

.header-logo-text strong {
    font-size: 1.2rem;
    color: #1e293b;
}

.header-logo-text span {
    font-size: 0.7rem;
    color: #64748b;
}

/* ========== جستجو ========== */
.search-wrapper {
    position: relative;
    flex: 1;
    max-width: 580px;
    min-width: 200px;
}

.search-box-header {
    display: flex;
    align-items: center;
    background: #f8fafc;
    border: 2px solid #e2e8f0;
    border-radius: 60px;
    padding: 3px 3px 3px 6px;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.03);
}

.search-box-header::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 50%;
    width: 0;
    height: 3px;
    background: linear-gradient(90deg, #d25f00, #f59e0b, #d25f00);
    background-size: 200% auto;
    border-radius: 10px;
    transition: all 0.4s ease;
    transform: translateX(-50%);
}

.search-box-header:focus-within::after {
    width: 80%;
    animation: shimmerLine 2s linear infinite;
}

@keyframes shimmerLine {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
}

.search-box-header:focus-within {
    border-color: #d25f00;
    box-shadow: 0 4px 20px rgba(210,95,0,0.12), 0 0 0 4px rgba(210,95,0,0.06);
    background: white;
    transform: scale(1.01);
}

.search-icon-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    transition: all 0.3s ease;
    flex-shrink: 0;
}

.search-box-header:focus-within .search-icon-wrapper {
    background: rgba(210,95,0,0.08);
}

.search-icon-header {
    color: #94a3b8;
    font-size: 0.9rem;
    transition: all 0.3s ease;
}

.search-box-header:focus-within .search-icon-header {
    color: #d25f00;
    transform: scale(1.1);
}

.search-box-header input {
    flex: 1;
    border: none;
    background: transparent;
    padding: 10px 8px;
    font-size: 0.9rem;
    outline: none;
    color: #1e293b;
    font-weight: 400;
    min-width: 100px;
}

.search-box-header input::placeholder {
    color: #94a3b8;
    font-weight: 300;
    transition: all 0.3s ease;
}

.search-box-header:focus-within input::placeholder {
    color: #cbd5e1;
    transform: translateX(5px);
}

.search-btn-header {
    background: linear-gradient(135deg, #d25f00, #a84a00);
    border: none;
    border-radius: 50px;
    padding: 8px 20px 8px 16px;
    cursor: pointer;
    color: white;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
    font-size: 0.8rem;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
}

.search-btn-header::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.6s ease, height 0.6s ease;
}

.search-btn-header:hover::before {
    width: 300px;
    height: 300px;
}

.search-btn-header:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 6px 24px rgba(210,95,0,0.35);
}

.search-btn-header:active {
    transform: scale(0.96);
}

.search-btn-header i {
    font-size: 0.9rem;
    position: relative;
    z-index: 1;
}

.search-btn-text {
    position: relative;
    z-index: 1;
    letter-spacing: 0.3px;
}

/* ========== باکس پیشنهادات جستجو ========== */
.search-suggestions {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    left: 0;
    background: white;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.12), 0 8px 24px rgba(0,0,0,0.06);
    display: none;
    max-height: 450px;
    overflow-y: auto;
    z-index: 1001;
    padding: 6px 0;
    border: 1px solid rgba(226,232,240,0.5);
    backdrop-filter: blur(12px);
}

.search-suggestions.show {
    display: block;
    animation: suggestionSlideDown 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
}

@keyframes suggestionSlideDown {
    from {
        opacity: 0;
        transform: translateY(-12px) scale(0.97);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

.search-suggestions::-webkit-scrollbar {
    width: 6px;
}

.search-suggestions::-webkit-scrollbar-track {
    background: #f1f5f9;
    border-radius: 10px;
    margin: 6px 0;
}

.search-suggestions::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #d25f00, #f59e0b);
    border-radius: 10px;
}

.suggestion-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 18px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s ease;
    border-bottom: 1px solid #f8fafc;
    position: relative;
}

.suggestion-item:last-child {
    border-bottom: none;
}

.suggestion-item:hover {
    background: linear-gradient(135deg, #fef5ed, #fde8d6);
    padding-right: 22px;
}

.suggestion-item::before {
    content: '';
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%) scaleX(0);
    width: 4px;
    height: 30px;
    background: linear-gradient(180deg, #d25f00, #f59e0b);
    border-radius: 0 4px 4px 0;
    transition: all 0.3s ease;
}

.suggestion-item:hover::before {
    transform: translateY(-50%) scaleX(1);
}

.suggestion-img {

}

    border-color: #d25f00;
    box-shadow: 0 2px 8px rgba(210,95,0,0.08);
}

.suggestion-img img {
    width: 100%;

    object-fit: contain;
    transition: transform 0.3s ease;
}

.suggestion-item:hover .suggestion-img img {
    transform: scale(1.05);
}

.suggestion-img i {
    font-size: 24px;

}

.suggestion-item:hover .suggestion-img i {
    color: #d25f00;
}

.suggestion-info {

}

.suggestion-info h4 {

}

.suggestion-item:hover .suggestion-info h4 {

}

.suggestion-info p {

}

.suggestion-info p .type-badge {

<script>
document.addEventListener('DOMContentLoaded', function() {
    fetchCategoriesForMenu();
    setupSearch();
});

async function fetchCategoriesForMenu() {
    const container = document.getElementById('categoriesListMenu');
    if (!container) return;
    try {
        const response = await fetch('/product/noneParentCategory/');
        const result = await response.json();
        if (result.status === 'success' && result.data && result.data.length > 0) {
            container.innerHTML = result.data.map(cat => `
                <div class="category-item-menu" data-category-id="${cat.id}" data-category-slug="${cat.slug}">
                    <div class="category-main-link">
                        <a href="/product/shop/?category=${cat.slug}" style="color: inherit; text-decoration: none; display: flex; align-items: center; justify-content: space-between; width: 100%;">
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <i class="fas ${getCategoryIcon(cat.name)}"></i>
                                <span>${escapeHtml(cat.name)}</span>
                            </div>
                            <i class="fas fa-chevron-left chevron-left"></i>
                        </a>
                    </div>
                    <div class="mega-3col-menu" id="megaMenu-${cat.id}">
                        <div class="loading-menu">⏳ بارگذاری...</div>
                    </div>
                </div>
            `).join('');
            for (const cat of result.data) {
                fetchMegaMenuData(cat.id, cat.slug);
            }
        } else {
            container.innerHTML = '<div style="padding:20px;text-align:center;">دسته‌بندی موجود نیست</div>';
        }
    } catch (error) {
        console.error('Error:', error);
        container.innerHTML = '<div style="padding:20px;text-align:center;">خطا در بارگذاری</div>';
    }
}

async function fetchMegaMenuData(categoryId, categorySlug) {
    const megaContainer = document.getElementById(`megaMenu-${categoryId}`);
    if (!megaContainer) return;
    try {
        const response = await fetch(`/product/category-mega-menu/${categorySlug}/`);
        const result = await response.json();
        if (result.status === 'success') {
            const data = result.data;
            const brandsHtml = data.brands && data.brands.length > 0 ? data.brands.map(brand => `
                <a href="/product/shop/?brand=${brand.slug}" class="brand-item-mega">
                    <div class="brand-img-mega">${brand.image ? `<img src="${brand.image}" alt="${escapeHtml(brand.name)}" onerror="this.parentElement.innerHTML='<i class=\'fas fa-building\'></i>'">` : '<i class="fas fa-building"></i>'}</div>
                    <div><div class="brand-name-mega">${escapeHtml(brand.name)}</div><div class="brand-count-mega">${brand.product_count || 0} محصول</div></div>
                </a>
            `).join('') : '<div style="padding:12px; color:#94a3b8; font-size:0.7rem;">برندی یافت نشد</div>';

            const catalogsHtml = data.catalogs && data.catalogs.length > 0 ? data.catalogs.map(catalog => `
                <a href="/product/shop/?catalog=${catalog.slug}" class="catalog-item-mega">
                    <i class="fas fa-file-pdf"></i>
                    <div class="catalog-info-mega">
                        <div class="catalog-title-mega">${escapeHtml(catalog.title)}</div>
                        <div class="catalog-date-mega">${catalog.date || ''}</div>
                    </div>
                </a>
            `).join('') : '<div style="padding:12px; color:#94a3b8; font-size:0.7rem;">کاتالوگی یافت نشد</div>';

            const bestsellersHtml = data.bestsellers && data.bestsellers.length > 0 ? data.bestsellers.map(product => `
                <a href="/product/${product.slug}/" class="bestseller-item-mega">
                    <div class="bestseller-img-mega">${product.image ? `<img src="${product.image}" alt="${escapeHtml(product.name)}" onerror="this.parentElement.innerHTML='<i class=\'fas fa-box\'></i>'">` : '<i class="fas fa-box"></i>'}</div>
                    <div class="bestseller-info-mega">
                        <div class="bestseller-title-mega">${escapeHtml(product.name)}</div>
                        <div class="bestseller-price-mega">${Number(product.price).toLocaleString()} تومان</div>
                    </div>
                </a>
            `).join('') : '<div style="padding:12px; color:#94a3b8; font-size:0.7rem;">محصولی یافت نشد</div>';

            megaContainer.innerHTML = `<div class="mega-3col">
                <div class="mega-col">
                    <div class="mega-col-title"><i class="fas fa-trademark"></i> برندهای ${escapeHtml(data.category_name)}</div>
                    <div class="brands-list-mega">${brandsHtml}</div>
                </div>
                <div class="mega-col">
                    <div class="mega-col-title"><i class="fas fa-book-open"></i> کاتالوگ‌های ${escapeHtml(data.category_name)}</div>
                    <div class="catalogs-list-mega">${catalogsHtml}</div>
                </div>
                <div class="mega-col">
                    <div class="mega-col-title"><i class="fas fa-fire"></i> پرفروش‌های ${escapeHtml(data.category_name)}</div>
                    <div class="bestsellers-list-mega">${bestsellersHtml}</div>
                </div>
            </div>`;
        } else {
            megaContainer.innerHTML = '<div style="padding:20px;text-align:center;">خطا</div>';
        }
    } catch (error) {
        console.error('Error:', error);
        megaContainer.innerHTML = '<div style="padding:20px;text-align:center;">خطا</div>';
    }
}

function getCategoryIcon(name) {
    if (name.includes('پارکت') || name.includes('لمینت')) return 'fa-tree';
    if (name.includes('کاغذ دیواری')) return 'fa-palette';
    if (name.includes('سنگ')) return 'fa-gem';
    return 'fa-folder';
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function setupSearch() {
    const searchInput = document.getElementById('globalSearchInput');
    const searchBtn = document.getElementById('searchBtnHeader');
    const suggestionsBox = document.getElementById('searchSuggestions');
    let lastQuery = '';

    async function performSearch() {
        const query = searchInput.value.trim();

        if (query === lastQuery && suggestionsBox.classList.contains('show')) return;
        lastQuery = query;

        if (query.length < 2) {
            suggestionsBox.classList.remove('show');
            return;
        }

        suggestionsBox.innerHTML = '<div style="padding:20px;text-align:center;color:#94a3b8;">در حال جستجو...</div>';
        suggestionsBox.classList.add('show');

        try {
            const response = await fetch(`/search/search-suggestions/?q=${encodeURIComponent(query)}`);
            const result = await response.json();

            if (result.status === 'success' && result.data && result.data.length > 0) {
                suggestionsBox.innerHTML = result.data.map(item => {
                    let defaultIcon = 'fa-tag';
                    let typeLabel = 'عمومی';
                    if (item.type === 'product') { defaultIcon = 'fa-box-open'; typeLabel = 'محصول'; }
                    if (item.type === 'brand') { defaultIcon = 'fa-building'; typeLabel = 'برند'; }
                    if (item.type === 'category') { defaultIcon = 'fa-folder-open'; typeLabel = 'دسته‌بندی'; }
                    if (item.type === 'catalog') { defaultIcon = 'fa-file-pdf'; typeLabel = 'کاتالوگ'; }

                    return `
                    <a href="${item.url}" class="suggestion-item">
                        <div class="suggestion-img">
                            ${item.image && !item.image.includes('placeholder') ?
                                `<img src="${item.image}" alt="${escapeHtml(item.title)}" onerror="this.parentElement.innerHTML='<i class=\'fas ${defaultIcon}\' style=\'font-size: 22px; color: #cbd5e1;\'></i>'">` :
                                `<i class="fas ${defaultIcon}" style="font-size: 22px; color: #cbd5e1;"></i>`
                            }
                        </div>
                        <div class="suggestion-info">
                            <h4>${escapeHtml(item.title)}</h4>
                            <p><span class="type-badge">${typeLabel}</span></p>
                        </div>
                    </a>`;
                }).join('');
            } else {
                suggestionsBox.innerHTML = `
                    <div style="padding:24px;text-align:center;color:#94a3b8;display:flex;flex-direction:column;align-items:center;gap:8px;">
                        <i class="fas fa-search" style="font-size:28px;color:#e2e8f0;"></i>
                        <span>نتیجه‌ای برای "${escapeHtml(query)}" یافت نشد</span>
                        <span style="font-size:0.65rem;">کلمات کلیدی دیگری را امتحان کنید</span>
                    </div>
                `;
            }
        } catch (error) {
            console.error('Search error:', error);
            suggestionsBox.innerHTML = '<div style="padding:20px;text-align:center;color:#ef4444;">خطا در ارتباط با سرور</div>';
        }
    }

    let searchTimeout;
    searchInput.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(performSearch, 300);
    });

    if (searchBtn) {
        searchBtn.addEventListener('click', () => {
            clearTimeout(searchTimeout);
            performSearch();
        });
    }

    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            clearTimeout(searchTimeout);
            performSearch();
        }
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-wrapper')) {
            suggestionsBox.classList.remove('show');
        }
    });
}
</script>
