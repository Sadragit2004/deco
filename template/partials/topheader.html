<script>
// ==================== تابع تنظیم رنگ و متن پلن ====================
function updateTier(tier) {
    const tierSpan = document.getElementById('tierValue');
    if (!tierSpan) return;

    tierSpan.classList.remove('tier-bronze', 'tier-silver', 'tier-gold', 'tier-platinum');

    if (tier === 'bronze') {
        tierSpan.innerText = 'برنزی';
        tierSpan.classList.add('tier-bronze');
    } else if (tier === 'silver') {
        tierSpan.innerText = 'نقره‌ای';
        tierSpan.classList.add('tier-silver');
    } else if (tier === 'gold') {
        tierSpan.innerText = 'طلایی';
        tierSpan.classList.add('tier-gold');
    } else if (tier === 'platinum') {
        tierSpan.innerText = 'پلاتینیوم';
        tierSpan.classList.add('tier-platinum');
    }
}

// ==================== API CALLS ====================
async function getUserInfo() {
    try {
        const res = await fetch('/accounts/api/user/dashboard/');
        const result = await res.json();

        if (result.success) {
            const data = result.data;

            if (data.loyalty && data.loyalty.total_points_display) {
                document.getElementById('pointsValue').innerText = data.loyalty.total_points_display;
            }

            if (data.user && data.user.full_name) {
                document.getElementById('userName').innerText = data.user.full_name;
            }

            if (data.loyalty && data.loyalty.current_tier) {
                updateTier(data.loyalty.current_tier);
            }
        }
    } catch(e) {
        console.error(e);
    }
}

async function getAddresses() {
    try {
        const res = await fetch('/accounts/api/user/addresses/');
        const data = await res.json();
        if (data.success) {
            return data.addresses || [];
        }
        return [];
    } catch(e) {
        console.error(e);
        return [];
    }
}

async function loadProvinces() {
    try {
        const res = await fetch('/accounts/api/provinces-cities/');
        const data = await res.json();
        if (data.success) {
            return data.provinces || [];
        }
        return [];
    } catch(e) {
        console.error(e);
        return [];
    }
}

async function addAddress(addrData) {
    const res = await fetch('/accounts/api/address/add/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(addrData)
    });
    return res.json();
}

async function setDefaultAddress(addressId) {
    const res = await fetch('/accounts/api/address/set-default/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({address_id: addressId})
    });
    return res.json();
}

async function deleteAddress(addressId) {
    const res = await fetch('/accounts/api/address/delete/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({address_id: addressId})
    });
    return res.json();
}

async function getShopName() {
    try {
        const res = await fetch('/accounts/api/shop_name/');
        const data = await res.json();
        const shopNameText = document.getElementById('shopNameText');
        const shopNameBadge = document.getElementById('shopNameBadge');

        if (!shopNameText) return;

        if (data.shop_name && data.shop_name.trim() !== '') {
            shopNameText.innerText = data.shop_name;
            shopNameBadge.style.display = 'inline-flex';
        } else {
            shopNameText.innerText = 'نام فروشگاه';
            shopNameBadge.style.opacity = '0.6';
        }
    } catch(e) {
        console.error('خطا در دریافت نام فروشگاه:', e);
        const shopNameText = document.getElementById('shopNameText');
        if (shopNameText) {
            shopNameText.innerText = 'نام فروشگاه';
        }
    }
}

// ==================== VARIABLES ====================
let allAddresses = [];
let allProvinces = [];

function getAddressBadge(type) {
    const badges = {
        'home': '<span class="address-badge-custom badge-home"><i class="fas fa-home"></i> منزل</span>',
        'work': '<span class="address-badge-custom badge-work"><i class="fas fa-briefcase"></i> محل کار</span>',
        'other': '<span class="address-badge-custom badge-other"><i class="fas fa-map-marker"></i> سایر</span>'
    };
    return badges[type] || badges['other'];
}

async function refreshAddressList() {
    allAddresses = await getAddresses();

    const defaultAddr = allAddresses.find(a => a.is_default) || allAddresses[0];
    if (defaultAddr) {
        let addressText = defaultAddr.address_text || '';
        if (addressText.length > 45) addressText = addressText.substring(0, 45) + '...';
        document.getElementById('selectedAddress').innerHTML = `${addressText} (${defaultAddr.city_name || ''})`;
    } else {
        document.getElementById('selectedAddress').innerHTML = 'آدرسی ثبت نشده است';
    }

    const container = document.getElementById('addressList');
    if (!container) return;

    if (allAddresses.length === 0) {
        container.innerHTML = `
            <div style="text-align: center; padding: 40px 20px;">
                <i class="fas fa-map-marked-alt" style="font-size: 48px; color: #dee2e6; margin-bottom: 16px;"></i>
                <p style="color: #6c757d;">هیچ آدرسی ثبت نشده است</p>
                <p style="color: #adb5bd; font-size: 13px;">برای افزودن آدرس جدید، دکمه پایین را بزنید</p>
            </div>
        `;
        return;
    }

    container.innerHTML = allAddresses.map(addr => `
        <div class="address-item-custom ${addr.is_default ? 'selected' : ''}" data-id="${addr.id}" onclick="window.selectAddressItem('${addr.id}')">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; flex-wrap: wrap; gap: 8px;">
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                    ${addr.is_default ? '<span class="address-badge-custom badge-default"><i class="fas fa-star"></i> پیش‌فرض</span>' : ''}
                    ${getAddressBadge(addr.address_type)}
                </div>
                <div style="font-size: 11px; color: #6c757d;">
                    ${addr.province_name || ''} - ${addr.city_name || ''}
                </div>
            </div>
            <div style="font-size: 13px; color: #495057; margin-bottom: 10px; line-height: 1.5;">
                ${escapeHtml(addr.address_text || '')}
            </div>
            ${addr.postal_code ? `<div style="font-size: 11px; color: #adb5bd;"><i class="fas fa-mail-bulk"></i> ${addr.postal_code}</div>` : ''}
            <div style="display: flex; gap: 12px; margin-top: 12px; padding-top: 10px; border-top: 1px solid #f1f3f5;">
                ${!addr.is_default ? `<button onclick="window.makeDefault('${addr.id}'); event.stopPropagation();" style="background: none; border: none; color: #28a745; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 4px;"><i class="fas fa-check-circle"></i> تنظیم پیش‌فرض</button>` : ''}
                <button onclick="window.removeAddress('${addr.id}'); event.stopPropagation();" style="background: none; border: none; color: #dc3545; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 4px;"><i class="fas fa-trash-alt"></i> حذف</button>
            </div>
        </div>
    `).join('');
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

window.selectAddressItem = function(addressId) {
    const address = allAddresses.find(a => a.id == addressId);
    if (address) {
        let addressText = address.address_text || '';
        if (addressText.length > 45) addressText = addressText.substring(0, 45) + '...';
        document.getElementById('selectedAddress').innerHTML = `${addressText} (${address.city_name || ''})`;
        document.getElementById('addressModal').style.display = 'none';
        document.body.style.overflow = '';
    }
}

window.makeDefault = async function(id) {
    const result = await setDefaultAddress(id);
    if (result.success) {
        await refreshAddressList();
        alert('✓ آدرس پیش‌فرض تغییر کرد');
    } else {
        alert('خطا: ' + (result.error || 'مشکلی پیش آمد'));
    }
}

window.removeAddress = async function(id) {
    if (!confirm('آیا از حذف این آدرس اطمینان دارید؟')) return;
    const result = await deleteAddress(id);
    if (result.success) {
        await refreshAddressList();
        alert('✓ آدرس با موفقیت حذف شد');
    } else {
        alert('خطا: ' + (result.error || 'مشکلی پیش آمد'));
    }
}

async function initForm() {
    allProvinces = await loadProvinces();
    const provinceSelect = document.getElementById('province');
    if (!provinceSelect) return;

    provinceSelect.innerHTML = '<option value="">🏛 انتخاب استان</option>';
    allProvinces.forEach(p => {
        provinceSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`;
    });
}

function resetFormFields() {
    document.getElementById('province').value = '';
    document.getElementById('city').innerHTML = '<option value="">🌆 انتخاب شهر</option>';
    document.getElementById('addressText').value = '';
    document.getElementById('postalCode').value = '';
    document.getElementById('addrType').value = 'home';
    document.getElementById('isDefault').checked = false;
}

document.addEventListener('DOMContentLoaded', function() {
    getUserInfo();
    getShopName();
    refreshAddressList();

    const modal = document.getElementById('addressModal');
    const openBtn = document.getElementById('openAddressModal');
    const closeBtn = document.getElementById('closeModalBtn');
    const showAddBtn = document.getElementById('showAddBtn');
    const cancelFormBtn = document.getElementById('cancelForm');
    const saveAddrBtn = document.getElementById('saveAddr');
    const addFormContainer = document.getElementById('addFormContainer');

    if (openBtn) {
        openBtn.onclick = () => {
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
            refreshAddressList();
            if (addFormContainer) addFormContainer.style.display = 'none';
            resetFormFields();
        };
    }

    if (closeBtn) {
        closeBtn.onclick = () => {
            modal.style.display = 'none';
            document.body.style.overflow = '';
            if (addFormContainer) addFormContainer.style.display = 'none';
        };
    }

    if (showAddBtn) {
        showAddBtn.onclick = () => {
            if (addFormContainer) {
                addFormContainer.style.display = 'block';
                initForm();
                resetFormFields();
                addFormContainer.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }
        };
    }

    if (cancelFormBtn) {
        cancelFormBtn.onclick = () => {
            if (addFormContainer) {
                addFormContainer.style.display = 'none';
                resetFormFields();
            }
        };
    }

    const provinceSelect = document.getElementById('province');
    if (provinceSelect) {
        provinceSelect.onchange = function() {
            const province = allProvinces.find(p => p.id == this.value);
            const citySelect = document.getElementById('city');
            if (!province || !citySelect) return;

            citySelect.innerHTML = '<option value="">🌆 انتخاب شهر</option>';
            if (province.cities && province.cities.length > 0) {
                province.cities.forEach(c => {
                    citySelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                });
            }
        };
    }

    if (saveAddrBtn) {
        saveAddrBtn.onclick = async function() {
            const provinceId = document.getElementById('province').value;
            const cityId = document.getElementById('city').value;
            const addressText = document.getElementById('addressText').value.trim();
            const postalCode = document.getElementById('postalCode').value.trim();
            const addressType = document.getElementById('addrType').value;
            const isDefault = document.getElementById('isDefault').checked;

            if (!provinceId || !cityId || !addressText) {
                alert('⚠ لطفاً استان، شهر و آدرس را وارد کنید');
                return;
            }

            const result = await addAddress({
                province_id: provinceId,
                city_id: cityId,
                address_text: addressText,
                postal_code: postalCode || '',
                address_type: addressType,
                is_default: isDefault
            });

            if (result.success) {
                alert('✓ آدرس با موفقیت اضافه شد');
                if (addFormContainer) {
                    addFormContainer.style.display = 'none';
                    resetFormFields();
                }
                await refreshAddressList();
            } else {
                alert('⚠ خطا: ' + (result.error || 'مشکلی پیش آمد'));
            }
        };
    }

    if (modal) {
        modal.addEventListener('click', function(e) {
            if (e.target === modal || e.target.classList?.contains('modal-backdrop')) {
                modal.style.display = 'none';
                document.body.style.overflow = '';
                if (addFormContainer) addFormContainer.style.display = 'none';
            }
        });
    }
});

setInterval(() => {
    getUserInfo();
    if (document.getElementById('addressModal')?.style.display === 'block') {
        refreshAddressList();
    }
}, 30000);
</script>
