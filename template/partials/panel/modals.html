<div id="mobileUserModal" class="modal-overlay-mobile"><div class="modal-container-mobile"><h3 style="color:white; margin-bottom:16px;">کاربر جدید</h3><form id="mAddUserForm"><div class="form-group-mobile"><label>نام کامل</label><input type="text" id="mUserName" required></div><div class="form-group-mobile"><label>ایمیل</label><input type="email" id="mUserEmail" required></div><div class="form-group-mobile"><label>تلفن</label><input type="text" id="mUserPhone"></div><button type="submit" class="btn-primary-mobile">ثبت</button></form><button class="btn-primary-mobile" style="margin-top:12px; background:#2d3748;" onclick="closeMobileUserModal()">بستن</button></div></div>
<div id="mobileProductModal" class="modal-overlay-mobile"><div class="modal-container-mobile"><h3 style="color:white; margin-bottom:16px;">محصول جدید</h3><form id="mAddProductForm"><div class="form-group-mobile"><label>نام محصول</label><input type="text" id="mProductName" required></div><div class="form-group-mobile"><label>دسته</label><select id="mProductCat"><option>اکسسوری</option><option>الکترونیک</option><option>پوشاک</option></select></div><div class="form-group-mobile"><label>قیمت</label><input type="number" id="mProductPrice" required></div><div class="form-group-mobile"><label>موجودی</label><input type="number" id="mProductStock" value="0"></div><button type="submit" class="btn-primary-mobile">ثبت</button></form><button class="btn-primary-mobile" style="margin-top:12px; background:#2d3748;" onclick="closeMobileProductModal()">بستن</button></div></div>
<div id="mobilePrintModal" class="modal-overlay-mobile"><div class="modal-container-mobile"><h3 style="color:white">سفارش چاپی</h3><form id="mAddPrintForm"><div class="form-group-mobile"><label>مشتری</label><input type="text" id="mPrintCustomer" required></div><div class="form-group-mobile"><label>جنس</label><select id="mPrintMaterial"><option>متال</option><option>چوب</option><option>پلاستیک</option></select></div><div class="form-group-mobile"><label>مبلغ</label><input type="number" id="mPrintAmount" required></div><div class="form-group-mobile"><label>رسید (آدرس عکس)</label><input type="text" id="mPrintReceipt"></div><button type="submit" class="btn-primary-mobile">ثبت سفارش</button></form><button class="btn-primary-mobile" style="margin-top:12px; background:#2d3748;" onclick="closeMobilePrintModal()">بستن</button></div></div>
