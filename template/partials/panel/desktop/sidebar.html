<!-- ========== مودال افزودن کاربر ========== -->
<div id="addUserModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-user-plus"></i> افزودن کاربر جدید</h3>
            <button class="modal-close" onclick="closeModal('addUserModal')">&times;</button>
        </div>

        <form id="addUserForm" enctype="multipart/form-data">
            <!-- آواتار -->
            <div class="avatar-upload">
                <div class="avatar-preview" id="avatarPreview">
                    <i class="fas fa-camera"></i>
                </div>
                <input type="file" id="avatarInput" name="avatar" accept="image/*" style="display:none;">
                <button type="button" class="avatar-btn" onclick="document.getElementById('avatarInput').click()">انتخاب عکس</button>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>نام <span class="required">*</span></label>
                    <input type="text" id="userName" name="name" placeholder="نام" required>
                </div>
                <div class="form-group">
                    <label>نام خانوادگی <span class="required">*</span></label>
                    <input type="text" id="userFamily" name="family" placeholder="نام خانوادگی" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>شماره موبایل <span class="required">*</span></label>
                    <input type="tel" id="userMobile" name="mobileNumber" placeholder="09123456789" required>
                </div>
                <div class="form-group">
                    <label>ایمیل</label>
                    <input type="email" id="userEmail" name="email" placeholder="example@gmail.com">
                </div>
            </div>

            <div class="form-group">
                <label>نام فروشگاه</label>
                <input type="text" id="userShopName" name="shopName" placeholder="نام فروشگاه">
            </div>

            <button type="button" class="address-btn" onclick="openAddressModal()">
                <i class="fas fa-map-marker-alt"></i> افزودن آدرس
            </button>

            <div id="addressPreview" style="display:none;" class="address-preview">
                <p>آدرس ثبت شده:</p>
                <p id="addressText"></p>
            </div>

            <div class="admin-confirm">
                <label class="switch">
                    <input type="checkbox" id="adminConfirm">
                    <span class="slider"></span>
                </label>
                <div>
                    <strong>تایید مدیر ارشد</strong>
                    <small>فقط مدیران مجاز می‌توانند کاربر اضافه کنند</small>
                </div>
            </div>

            <div id="adminPassSection" style="display:none;" class="form-group">
                <input type="password" id="adminPassword" placeholder="رمز عبور مدیر ارشد">
            </div>

            <div class="modal-buttons">
                <button type="submit" class="btn-submit">ثبت کاربر</button>
                <button type="button" class="btn-cancel" onclick="closeModal('addUserModal')">انصراف</button>
            </div>
        </form>
    </div>
</div>

<!-- ========== مودال آدرس ========== -->
<div id="addressModal" class="modal">
    <div class="modal-content" style="max-width:450px;">
        <div class="modal-header">
            <h3><i class="fas fa-map-marker-alt"></i> آدرس کاربر</h3>
            <button class="modal-close" onclick="closeModal('addressModal')">&times;</button>
        </div>

        <div class="form-group">
            <label>استان</label>
            <select id="province">
                <option value="">انتخاب استان</option>
                <option>تهران</option><option>اصفهان</option><option>خراسان رضوی</option>
                <option>فارس</option><option>خوزستان</option><option>مازندران</option>
                <option>گیلان</option><option>البرز</option><option>قم</option><option>کرمان</option>
            </select>
        </div>

        <div class="form-group">
            <label>شهر</label>
            <input type="text" id="city" placeholder="نام شهر">
        </div>

        <div class="form-group">
            <label>آدرس کامل</label>
            <textarea id="fullAddress" rows="3" placeholder="خیابان، پلاک، واحد..."></textarea>
        </div>

        <div class="form-group">
            <label>کد پستی</label>
            <input type="text" id="postalCode" placeholder="کد پستی ۱۰ رقمی">
        </div>

        <div class="modal-buttons">
            <button class="btn-submit" onclick="saveAddress()">ثبت آدرس</button>
            <button class="btn-cancel" onclick="closeModal('addressModal')">انصراف</button>
        </div>
    </div>
</div>

<!-- ========== مودال افزودن محصول ========== -->
<div id="addProductModal" class="modal">
    <div class="modal-content" style="max-width:500px;">
        <div class="modal-header">
            <h3><i class="fas fa-box-plus"></i> افزودن محصول جدید</h3>
            <button class="modal-close" onclick="closeModal('addProductModal')">&times;</button>
        </div>

        <form id="addProductForm" enctype="multipart/form-data">
            <div class="form-group">
                <label>نام محصول <span class="required">*</span></label>
                <input type="text" id="productName" name="name" placeholder="نام محصول" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>دسته‌بندی</label>
                    <select id="productCategory" name="category">
                        <option>اکسسوری</option><option>الکترونیک</option><option>پوشاک</option>
                        <option>خانه و آشپزخانه</option><option>کتاب</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>قیمت (تومان) <span class="required">*</span></label>
                    <input type="number" id="productPrice" name="price" placeholder="۰" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>موجودی</label>
                    <input type="number" id="productStock" name="stock" value="0">
                </div>
                <div class="form-group">
                    <label>تصویر محصول</label>
                    <input type="file" id="productImage" name="image" accept="image/*" class="file-input">
                </div>
            </div>

            <div class="modal-buttons">
                <button type="submit" class="btn-submit">ثبت محصول</button>
                <button type="button" class="btn-cancel" onclick="closeModal('addProductModal')">انصراف</button>
            </div>
        </form>
    </div>
</div>

<script>
    // ========== سایدبار ==========
    document.querySelectorAll('.sidebar-item').forEach(item => {
        const url = item.getAttribute('data-url');
        if (url && window.location.pathname === url) {
            item.classList.add('active');
        }

        item.addEventListener('click', function() {
            const targetUrl = this.getAttribute('data-url');
            if (targetUrl) window.location.href = targetUrl;
        });
    });

    // ========== توابع مودال ==========
    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function openModal(id) {
        document.getElementById(id).style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    document.getElementById('openUserModalBtn')?.addEventListener('click', () => {
        openModal('addUserModal');
    });

    document.getElementById('openProductModalBtn')?.addEventListener('click', () => {
        openModal('addProductModal');
    });

    // بستن با کلیک خارج
    window.onclick = function(e) {
        if (e.target.classList.contains('modal')) {
            e.target.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    }

    // ========== آواتار ==========
    document.getElementById('avatarInput')?.addEventListener('change', function(e) {
        const preview = document.getElementById('avatarPreview');
        if (e.target.files && e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                preview.innerHTML = `<img src="${ev.target.result}" alt="آواتار">`;
            }
            reader.readAsDataURL(e.target.files[0]);
        }
    });

    // ========== تایید مدیر ==========
    document.getElementById('adminConfirm')?.addEventListener('change', function() {
        const passSection = document.getElementById('adminPassSection');
        passSection.style.display = this.checked ? 'block' : 'none';
    });

    // ========== آدرس ==========
    let savedAddress = null;

    window.openAddressModal = function() {
        openModal('addressModal');
    }

    window.saveAddress = function() {
        const province = document.getElementById('province').value;
        const city = document.getElementById('city').value;
        const fullAddress = document.getElementById('fullAddress').value;
        const postalCode = document.getElementById('postalCode').value;

        if (!province || !city || !fullAddress) {
            alert('لطفاً استان، شهر و آدرس کامل را وارد کنید');
            return;
        }

        savedAddress = { province, city, fullAddress, postalCode };

        const previewDiv = document.getElementById('addressPreview');
        const addressText = document.getElementById('addressText');
        addressText.innerHTML = `${province}، ${city}<br>${fullAddress}<br>کد پستی: ${postalCode || 'نامشخص'}`;
        previewDiv.style.display = 'block';

        closeModal('addressModal');
    }

    // ========== ارسال فرم کاربر ==========
    document.getElementById('addUserForm')?.addEventListener('submit', async function(e) {
        e.preventDefault();

        const isAdminConfirmed = document.getElementById('adminConfirm').checked;
        const adminPass = document.getElementById('adminPassword')?.value;

        if (isAdminConfirmed && adminPass !== 'admin123') {
            alert('رمز عبور مدیر ارشد اشتباه است');
            return;
        }

        const formData = new FormData();
        formData.append('name', document.getElementById('userName').value);
        formData.append('family', document.getElementById('userFamily').value);
        formData.append('mobileNumber', document.getElementById('userMobile').value);
        formData.append('email', document.getElementById('userEmail').value);
        formData.append('shopName', document.getElementById('userShopName').value);

        if (savedAddress) formData.append('address', JSON.stringify(savedAddress));

        const avatarFile = document.getElementById('avatarInput').files[0];
        if (avatarFile) formData.append('avatar', avatarFile);

        try {
            const response = await fetch('/panel/api/add-user/', {
                method: 'POST',
                headers: { 'X-CSRFToken': getCookie('csrftoken') },
                body: formData
            });
            const result = await response.json();
            if (result.status === 'success') {
                alert('✅ کاربر با موفقیت اضافه شد');
                location.reload();
            } else {
                alert('❌ خطا: ' + (result.message || 'خطای ناشناخته'));
            }
        } catch(error) {
            alert('❌ خطا در ارتباط با سرور');
            console.error('Error:', error);
        }
    });

    // ========== ارسال فرم محصول ==========
    document.getElementById('addProductForm')?.addEventListener('submit', async function(e) {
        e.preventDefault();

        const formData = new FormData();
        formData.append('name', document.getElementById('productName').value);
        formData.append('category', document.getElementById('productCategory').value);
        formData.append('price', document.getElementById('productPrice').value);
        formData.append('stock', document.getElementById('productStock').value);

        const productImage = document.getElementById('productImage').files[0];
        if (productImage) formData.append('image', productImage);

        try {
            const response = await fetch('/panel/api/add-product/', {
                method: 'POST',
                headers: { 'X-CSRFToken': getCookie('csrftoken') },
                body: formData
            });
            const result = await response.json();
            if (result.status === 'success') {
                alert('✅ محصول با موفقیت اضافه شد');
                location.reload();
            } else {
                alert('❌ خطا: ' + (result.message || 'خطای ناشناخته'));
            }
        } catch(error) {
            alert('❌ خطا در ارتباط با سرور');
            console.error('Error:', error);
        }
    });

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }
</script>
