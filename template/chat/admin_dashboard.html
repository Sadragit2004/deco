<!-- templates/chat/admin_dashboard.html -->

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد ادمین - پشتیبانی</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== Reset & Base ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tahoma', 'Segoe UI', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        /* ===== Container ===== */
        .admin-container {
            width: 100%;
            max-width: 1400px;
            height: 95vh;
            max-height: 900px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.1);
            display: flex;
            overflow: hidden;
            transition: all 0.3s;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 360px;
            min-width: 280px;
            background: #f8f9fa;
            border-left: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .sidebar-header {
            padding: 18px 22px;
            background: linear-gradient(145deg, #075e54 0%, #128c7e 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        .sidebar-header::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 60%;
            height: 200%;
            background: radial-gradient(ellipse, rgba(255,255,255,0.08), transparent 70%);
            pointer-events: none;
        }
        .sidebar-header h3 {
            font-size: 17px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1;
        }
        .sidebar-header .badge {
            background: #ef4444;
            color: white;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            z-index: 1;
            transition: all 0.3s;
            box-shadow: 0 2px 12px rgba(239, 68, 68, 0.3);
        }
        .sidebar-header .badge.hidden { display: none; }

        .status-bar {
            padding: 8px 18px;
            background: #f8f9fa;
            font-size: 12px;
            color: #666;
            text-align: center;
            border-bottom: 1px solid #e9ecef;
            transition: all 0.3s;
            font-weight: 600;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .status-bar.online {
            color: #059669;
            background: linear-gradient(145deg, #ecfdf5, #d1fae5);
        }
        .status-bar.offline {
            color: #dc2626;
            background: linear-gradient(145deg, #fef2f2, #fecaca);
        }
        .status-bar .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-bar .status-dot.online { background: #4ade80; animation: pulse-dot 1.5s infinite; }
        .status-bar .status-dot.offline { background: #f87171; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* ===== Search ===== */
        .search-box {
            padding: 12px 16px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            flex-shrink: 0;
        }
        .search-box input {
            width: 100%;
            padding: 10px 16px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 13px;
            outline: none;
            transition: all 0.3s;
            background: white;
            font-family: inherit;
        }
        .search-box input:focus {
            border-color: #075e54;
            box-shadow: 0 0 0 4px rgba(7, 94, 84, 0.08);
        }
        .search-box input::placeholder {
            color: #adb5bd;
        }

        /* ===== Chat List ===== */
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 10px;
        }
        .chat-list::-webkit-scrollbar {
            width: 5px;
        }
        .chat-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        .chat-list::-webkit-scrollbar-thumb {
            background: #d1c7c1;
            border-radius: 3px;
        }
        .chat-list::-webkit-scrollbar-thumb:hover {
            background: #a89a92;
        }

        /* ===== Chat Item ===== */
        .chat-item {
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-bottom: 4px;
            border: 2px solid transparent;
            user-select: none;
            position: relative;
        }
        .chat-item:hover {
            background: #e9ecef;
            transform: translateX(-6px);
        }
        .chat-item.active {
            background: linear-gradient(145deg, #075e54 0%, #128c7e 100%);
            color: white;
            border-color: #075e54;
            box-shadow: 0 4px 20px rgba(7, 94, 84, 0.25);
            transform: translateX(-4px);
        }
        .chat-item .chat-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-item .chat-name {
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-item .chat-name .avatar-small {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background: linear-gradient(145deg, #075e54, #128c7e);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 700;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .chat-item .chat-name .avatar-small img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .chat-item .chat-name .online-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            border: 2px solid white;
            flex-shrink: 0;
        }
        .chat-item .chat-name .online-status.online {
            background: #4ade80;
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.5);
        }
        .chat-item .chat-name .online-status.offline {
            background: #d1d5db;
        }
        .chat-item .chat-preview {
            font-size: 12px;
            color: #6c757d;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 46px;
        }
        .chat-item.active .chat-preview {
            color: rgba(255,255,255,0.85);
        }
        .chat-item .chat-time {
            font-size: 10px;
            color: #adb5bd;
            font-weight: 500;
        }
        .chat-item.active .chat-time {
            color: rgba(255,255,255,0.7);
        }
        .chat-item .unread-badge {
            background: #ef4444;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 700;
            min-width: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
        }
        .chat-item.active .unread-badge {
            background: #fbbf24;
            color: #1f2937;
            box-shadow: 0 2px 8px rgba(251, 191, 36, 0.3);
        }
        .user-mobile {
            font-size: 11px;
            color: #6c757d;
            margin-right: 8px;
            direction: ltr;
            font-weight: 500;
        }
        .chat-item.active .user-mobile {
            color: rgba(255,255,255,0.7);
        }

        /* ===== Chat Area ===== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #e5ddd5;
            position: relative;
        }

        /* ===== Chat Header ===== */
        .chat-area-header {
            padding: 14px 22px;
            background: white;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 70px;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
            gap: 10px;
            flex-wrap: wrap;
        }
        .chat-area-header .user-info {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            min-width: 0;
        }
        .chat-area-header .user-info .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(145deg, #075e54, #128c7e);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 700;
            flex-shrink: 0;
            overflow: hidden;
            border: 2px solid rgba(7, 94, 84, 0.2);
        }
        .chat-area-header .user-info .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .chat-area-header .user-info .details {
            min-width: 0;
        }
        .chat-area-header .user-info .details h4 {
            font-size: 16px;
            font-weight: 700;
            color: #1f2937;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-area-header .user-info .details small {
            color: #6c757d;
            font-size: 12px;
            display: block;
            margin-top: 2px;
        }
        .chat-area-header .actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .chat-area-header .actions button {
            padding: 8px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-info {
            background: linear-gradient(145deg, #8b5cf6, #7c3aed);
            color: white;
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3);
        }
        .btn-info:hover {
            transform: scale(0.95) translateY(-2px);
            box-shadow: 0 6px 24px rgba(139, 92, 246, 0.4);
        }
        .btn-close {
            background: linear-gradient(145deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.3);
        }
        .btn-close:hover {
            transform: scale(0.95) translateY(-2px);
            box-shadow: 0 6px 24px rgba(239, 68, 68, 0.4);
        }
        .btn-refresh {
            background: linear-gradient(145deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
        }
        .btn-refresh:hover {
            transform: scale(0.95) translateY(-2px);
            box-shadow: 0 6px 24px rgba(59, 130, 246, 0.4);
        }
        .btn-refresh:active {
            transform: rotate(180deg) scale(0.9);
        }

        /* ===== Chat Messages ===== */
        .chat-messages {
            flex: 1;
            padding: 16px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 300px;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d1c7c1' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(209, 199, 193, 0.3);
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #a89a92;
            border-radius: 3px;
        }
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #8a7a72;
        }

        /* ===== پیام‌ها ===== */
        .message {
            max-width: 78%;
            padding: 10px 16px;
            border-radius: 14px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.6;
            animation: messageIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            position: relative;
        }
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(12px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.sent {
            align-self: flex-start;
            background: linear-gradient(145deg, #dcf8c6 0%, #c5e8b0 100%);
            border-bottom-right-radius: 4px;
            border-left: 3px solid rgba(7, 94, 84, 0.2);
        }

        .message.received {
            align-self: flex-end;
            background: white;
            border-bottom-left-radius: 4px;
            border-right: 3px solid rgba(7, 94, 84, 0.1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .message .sender-name {
            font-size: 11px;
            font-weight: 700;
            color: #075e54;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .message .message-text {
            word-break: break-word;
            color: #1f2937;
        }
        .message .time {
            font-size: 10px;
            color: #999;
            margin-top: 5px;
            display: block;
            text-align: left;
            direction: ltr;
            font-weight: 500;
        }

        /* ===== نشان دیده شده ===== */
        .message .seen-badge {
            font-size: 11px;
            margin-right: 6px;
            font-weight: 600;
            display: inline-block;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .message .seen-badge.seen {
            color: #4ade80;
        }
        .message .seen-badge.sending {
            color: #fbbf24;
            animation: pulse-seen 1s infinite;
        }
        .message .seen-badge.delivered {
            color: #9ca3af;
        }
        @keyframes pulse-seen {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @keyframes seen-pop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); opacity: 1; }
        }
        .message .seen-badge.seen {
            animation: seen-pop 0.3s ease;
        }

        /* ===== فایل‌ها ===== */
        .message-file {
            margin-top: 6px;
            padding: 8px 14px;
            background: rgba(0,0,0,0.04);
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(0,0,0,0.04);
        }
        .message-file:hover {
            background: rgba(0,0,0,0.08);
            transform: scale(1.02);
        }
        .message-file .file-icon { font-size: 24px; }
        .message-file .file-info { flex: 1; }
        .message-file .file-name { font-size: 13px; font-weight: 600; color: #075e54; }
        .message-file .file-size { font-size: 11px; color: #999; }
        .message-file .file-download { color: #075e54; font-size: 18px; }

        .message-image {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .message-image:hover {
            border-color: #075e54;
            transform: scale(1.03);
        }
        .message-video {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 6px;
        }
        .message-audio {
            width: 100%;
            margin-top: 6px;
            border-radius: 10px;
        }

        /* ===== Empty States ===== */
        .no-chat-selected {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #6c757d;
            gap: 16px;
        }
        .no-chat-selected .icon { font-size: 72px; opacity: 0.2; }
        .no-chat-selected h3 { font-size: 20px; font-weight: 700; color: #374151; }
        .no-chat-selected p { font-size: 14px; color: #9ca3af; }

        .empty-state {
            text-align: center;
            color: #888;
            padding: 40px 20px;
            font-size: 14px;
        }
        .empty-state .icon { font-size: 48px; opacity: 0.3; margin-bottom: 12px; }

        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #075e54;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== Chat Input ===== */
        .chat-input {
            padding: 12px 18px;
            background: white;
            border-top: 2px solid #e9ecef;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .chat-input .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: center;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 30px;
            padding: 2px 6px 2px 18px;
            transition: all 0.3s;
        }
        .chat-input .input-wrapper:focus-within {
            border-color: #075e54;
            background: white;
            box-shadow: 0 0 0 6px rgba(7, 94, 84, 0.06);
        }
        .chat-input .input-wrapper input {
            flex: 1;
            padding: 10px 0;
            border: none;
            outline: none;
            font-size: 14px;
            background: transparent;
            font-family: inherit;
            color: #1f2937;
        }
        .chat-input .input-wrapper input::placeholder { color: #adb5bd; }
        .chat-input .input-wrapper input:disabled { opacity: 0.6; cursor: not-allowed; }
        .chat-input .file-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 50%;
            transition: all 0.3s;
            color: #075e54;
        }
        .chat-input .file-btn:hover:not(:disabled) {
            background: rgba(7, 94, 84, 0.08);
            transform: scale(1.15) rotate(-8deg);
        }
        .chat-input .file-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .chat-input .send-btn {
            padding: 12px 28px;
            background: linear-gradient(145deg, #075e54 0%, #128c7e 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(7, 94, 84, 0.2);
        }
        .chat-input .send-btn:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 32px rgba(7, 94, 84, 0.3);
        }
        .chat-input .send-btn:active:not(:disabled) { transform: translateY(0) scale(0.96); }
        .chat-input .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ===== File Preview ===== */
        .file-preview {
            width: 100%;
            padding: 8px 14px;
            background: #f8f9fa;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideUp 0.3s ease;
            border: 1px solid #e9ecef;
        }
        .file-preview .preview-icon { font-size: 28px; }
        .file-preview .preview-info { flex: 1; }
        .file-preview .preview-name { font-size: 13px; font-weight: 600; color: #1f2937; }
        .file-preview .preview-size { font-size: 11px; color: #999; }
        .file-preview .preview-remove {
            background: none;
            border: none;
            color: #dc2626;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 50%;
            transition: all 0.3s;
        }
        .file-preview .preview-remove:hover {
            background: rgba(220, 38, 38, 0.08);
            transform: rotate(90deg);
        }
        .file-preview .preview-image {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid #e9ecef;
        }

        /* ===== Notification ===== */
        .notification {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(31, 41, 55, 0.92);
            backdrop-filter: blur(12px);
            color: white;
            padding: 14px 32px;
            border-radius: 16px;
            font-size: 14px;
            box-shadow: 0 16px 64px rgba(0,0,0,0.25);
            z-index: 1000;
            animation: notifIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 90%;
            text-align: center;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.06);
        }
        @keyframes notifIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-30px) scale(0.92); }
            to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== تایپینگ ===== */
        .typing-indicator {
            display: none;
            padding: 6px 16px;
            font-size: 12px;
            color: #888;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            margin: 4px 0;
            align-self: flex-start;

            font-family: 'Tahoma', sans-serif;

        .typing-indicator.show { display: inline-block; }
        .typing-indicator .dots {
            display: inline-block;
            animation: dotsAnim 1.4s infinite;
        }
        @keyframes dotsAnim {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }

        /* ================================================================
           🔥 مودال اطلاعات مشتری - طراحی مدرن و حرفه‌ای

        .customer-modal-overlay {

        /* ===== هدر مودال ===== */

    </style>
</head>
<body>
    <div class="admin-container">
        <!-- ===== Sidebar ===== -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-comment-dots"></i> چت‌ها</h3>
                <span class="badge hidden" id="unread-badge">0</span>
            </div>
            <div class="status-bar" id="status-bar">
                <span class="status-dot online" id="status-dot"></span>
                <span id="status-text">در حال بارگذاری...</span>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="🔍 جستجوی چت‌ها..." />
            </div>
            <div class="chat-list" id="chat-list">
                <div class="empty-state">
                    <div class="icon"><i class="fas fa-spinner fa-spin"></i></div>
                    <p>در حال بارگذاری...</p>
                </div>
            </div>
        </div>

        <!-- ===== Chat Area ===== -->
        <div class="chat-area">
            <div class="chat-area-header" id="chat-header">
                <div class="user-info">

                        <i class="fas fa-user"></i>
                    </div>

                        <small id="chat-user-mobile"></small>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn-info" id="customer-info-btn" style="display:none;" title="اطلاعات مشتری">
                        <i class="fas fa-user-circle"></i> اطلاعات
                    </button>
                    <button class="btn-refresh" id="refresh-btn" title="رفرش"><i class="fas fa-sync-alt"></i></button>
                    <button class="btn-close" id="close-chat-btn" style="display:none;"><i class="fas fa-times"></i> بستن</button>
                </div>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="no-chat-selected" id="no-chat-selected">
                    <div class="icon"><i class="fas fa-inbox"></i></div>
                    <h3>چتی را انتخاب کنید</h3>
                    <p>برای مشاهده پیام‌ها، یک چت را از لیست انتخاب کنید</p>
                </div>
            </div>

            <!-- تایپینگ -->
            <div class="typing-indicator" id="typing-indicator">
                <i class="fas fa-edit"></i>
                <span class="dots">...</span> در حال تایپ
            </div>

            <!-- File Preview -->
            <div id="file-preview-container" style="display:none; padding: 0 18px 6px 18px; background: white;">
                <div class="file-preview" id="file-preview">
                    <span class="preview-icon" id="preview-icon">📎</span>
                    <img class="preview-image" id="preview-image" style="display:none;" />
                    <div class="preview-info">
                        <div class="preview-name" id="preview-name">فایل</div>
                        <div class="preview-size" id="preview-size">۰ بایت</div>
                    </div>
                    <button class="preview-remove" id="preview-remove"><i class="fas fa-times"></i></button>
                </div>
            </div>

            <!-- Chat Input -->
            <div class="chat-input">
                <div class="input-wrapper">
                    <button class="file-btn" id="file-btn" title="آپلود فایل" disabled><i class="fas fa-paperclip"></i></button>
                    <input type="text" id="msg-input" placeholder="پیام خود را بنویسید..." disabled />
                    <input type="file" id="file-input" style="display:none;" accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.zip,.txt" />
                </div>
                <button class="send-btn" id="send-btn" disabled>
                    <i class="fas fa-paper-plane"></i> ارسال
                </button>
            </div>
        </div>
    </div>

    <!-- ============================================================
    🔥 مودال اطلاعات مشتری - طراحی جدید
    ============================================================ -->
    <div class="customer-modal-overlay" id="customerModal">
        <div class="customer-modal">
            <div class="modal-header">
                <div class="modal-title">
                    <div class="avatar-lg" id="modal-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-info-text">
                        <div class="name" id="modal-user-name">مشتری</div>
                        <div class="mobile" id="modal-user-mobile"></div>
                    </div>
                </div>
                <button class="modal-close" id="modal-close-btn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modal-body">
                <div class="modal-loading">
                    <div class="spinner"></div>
                    <p>در حال بارگذاری اطلاعات...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  داشبورد ادمین - کامل با دکمه اطلاعات مشتری
        // ============================================================

        // ======================== عناصر ========================
        var chatList = document.getElementById('chat-list');
        var chatMessages = document.getElementById('chat-messages');
        var msgInput = document.getElementById('msg-input');
        var sendBtn = document.getElementById('send-btn');
        var fileBtn = document.getElementById('file-btn');
        var fileInput = document.getElementById('file-input');
        var statusBar = document.getElementById('status-bar');
        var statusText = document.getElementById('status-text');
        var statusDot = document.getElementById('status-dot');
        var unreadBadge = document.getElementById('unread-badge');
        var noChatSelected = document.getElementById('no-chat-selected');
        var chatUserName = document.getElementById('chat-user-name');
        var chatUserMobile = document.getElementById('chat-user-mobile');
        var chatAvatar = document.getElementById('chat-avatar');
        var closeChatBtn = document.getElementById('close-chat-btn');
        var refreshBtn = document.getElementById('refresh-btn');
        var customerInfoBtn = document.getElementById('customer-info-btn');
        var filePreviewContainer = document.getElementById('file-preview-container');
        var previewIcon = document.getElementById('preview-icon');
        var previewImage = document.getElementById('preview-image');
        var previewName = document.getElementById('preview-name');
        var previewSize = document.getElementById('preview-size');
        var previewRemove = document.getElementById('preview-remove');
        var typingIndicator = document.getElementById('typing-indicator');
        var searchInput = document.getElementById('search-input');

        // ===== عناصر مودال =====
        var customerModal = document.getElementById('customerModal');
        var modalBody = document.getElementById('modal-body');
        var modalAvatar = document.getElementById('modal-avatar');
        var modalUserName = document.getElementById('modal-user-name');
        var modalUserMobile = document.getElementById('modal-user-mobile');
        var modalCloseBtn = document.getElementById('modal-close-btn');

        // ======================== متغیرها ========================
        var currentChatId = null;
        var currentUserId = null;
        var ws = null;
        var isConnected = false;
        var reconnectAttempts = 0;
        var chatMessagesCache = {};
        var selectedFile = null;
        var selectedFileType = 'file';
        var selectedFileData = null;
        var isSeenMarking = false;
        var allChats = [];
        var typingTimeout = null;

        // ======================== WebSocket ========================
        function connectWebSocket() {
            var wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            var wsHost = window.location.hostname;
            var wsPort = '5000';
            var wsUrl = wsProtocol + '//' + wsHost + ':' + wsPort + '/ws/chat/';

            console.log('🔌 Connecting to:', wsUrl);
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                isConnected = true;
                reconnectAttempts = 0;
                console.log('✅ WebSocket ادمین متصل شد!');
                statusText.textContent = 'متصل';
                statusDot.className = 'status-dot online';
                statusBar.className = 'status-bar online';
            };

            ws.onerror = function(error) {
                console.log('❌ خطا:', error);
                statusText.textContent = 'خطا در اتصال';
                statusDot.className = 'status-dot offline';
                statusBar.className = 'status-bar offline';
            };

            ws.onclose = function() {
                isConnected = false;
                console.log('🔴 اتصال قطع شد');
                statusText.textContent = 'قطع شده - تلاش مجدد...';
                statusDot.className = 'status-dot offline';
                statusBar.className = 'status-bar offline';

                if (reconnectAttempts < 10) {
                    reconnectAttempts++;
                    setTimeout(connectWebSocket, 3000);
                } else {
                    statusText.textContent = 'قطع شده - رفرش کنید';
                }
            };

            ws.onmessage = function(e) {
                try {
                    var data = JSON.parse(e.data);
                    console.log('📩 پیام جدید از WebSocket:', data);

                    if (data.type === 'message_seen_update') {
                        console.log('👁️ پیام دیده شد:', data.message_id);
                        if (currentChatId && data.chat_id == currentChatId) {
                            updateSingleMessageSeenUI(data.message_id);
                        }
                        return;
                    }

                    if (data.type === 'messages_seen_update') {
                        console.log('👁️ تمام پیام‌های چت دیده شدند:', data.count);
                        if (currentChatId && data.chat_id == currentChatId) {
                            updateAllMessagesSeenUI();
                        }
                        loadChats();
                        return;
                    }

                    if (data.type === 'typing') {
                        if (data.is_typing && data.chat_id == currentChatId) {
                            typingIndicator.classList.add('show');
                            clearTimeout(typingTimeout);
                            typingTimeout = setTimeout(function() {
                                typingIndicator.classList.remove('show');
                            }, 3000);
                        } else {
                            typingIndicator.classList.remove('show');
                        }
                        return;
                    }

                    if (data.type === 'admin_message' || data.type === 'chat_message' || data.type === 'message') {
                        var chatId = data.chat_id;
                        var isCurrentChat = currentChatId && chatId == currentChatId;

                        if (data.is_admin === true) {
                            console.log('⏭️ پیام از ادمین، نادیده گرفته شد');
                            if (chatId) {
                                if (!chatMessagesCache[chatId]) {
                                    chatMessagesCache[chatId] = [];
                                }
                                chatMessagesCache[chatId].push({
                                    message_id: data.message_id,
                                    content: data.message || data.content || '',
                                    sender_name: data.sender_name,
                                    timestamp: data.timestamp,
                                    is_admin: true,
                                    message_type: data.message_type || 'text',
                                    file_url: data.file_url,
                                    file_name: data.file_name,
                                    file_size: data.file_size,
                                    file_thumbnail: data.file_thumbnail,
                                    is_seen: data.is_seen || false,
                                });
                            }
                            return;
                        }

                        var messageContent = data.message || data.content || '';

                        if (chatId) {
                            if (!chatMessagesCache[chatId]) {
                                chatMessagesCache[chatId] = [];
                            }
                            chatMessagesCache[chatId].push({
                                message_id: data.message_id,
                                content: messageContent,
                                sender_name: data.sender_name,
                                timestamp: data.timestamp,
                                is_admin: false,
                                message_type: data.message_type || 'text',
                                file_url: data.file_url,
                                file_name: data.file_name,
                                file_size: data.file_size,
                                file_thumbnail: data.file_thumbnail,
                                is_seen: data.is_seen || false,
                            });

                            if (isCurrentChat) {
                                addMessageToUI({
                                    content: messageContent,
                                    sender_name: data.sender_name,
                                    timestamp: data.timestamp,
                                    is_admin: false,
                                    message_type: data.message_type || 'text',
                                    file_url: data.file_url,
                                    file_name: data.file_name,
                                    file_size: data.file_size,
                                    file_thumbnail: data.file_thumbnail,
                                    is_seen: data.is_seen || false,
                                    message_id: data.message_id,
                                }, false);

                                if (data.message_id) {
                                    markSingleMessageAsSeen(data.message_id);
                                }
                                markChatAsSeen(chatId);
                            }

                            loadChats();

                            if (!isCurrentChat) {
                                showNotification('📩 پیام جدید از ' + data.sender_name);
                                playNotificationSound();
                            }
                        }
                    }
                } catch (err) {
                    console.log('❌ خطا در parse:', err);
                }
            };
        }

        // ============================================================
        // 🔥 نشانه‌گذاری دیده شده
        // ============================================================

        function markChatAsSeen(chatId) {
            if (isSeenMarking) return;
            isSeenMarking = true;

            console.log('👁️ نشانه‌گذاری چت', chatId, 'به عنوان دیده شده');

            if (ws && isConnected) {
                ws.send(JSON.stringify({
                    action: 'mark_chat_seen',
                    chat_id: chatId
                }));
            }

            fetch('/chat/api/admin/chat/' + chatId + '/seen/', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': getCookie('csrftoken'),
                    'Content-Type': 'application/json'
                }
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                console.log('✅ نشانه‌گذاری دیده شده:', data);
                isSeenMarking = false;
                if (data.status === 'success') {
                    updateAllMessagesSeenUI();
                    loadChats();
                }
            })
            .catch(function(error) {
                console.error('❌ خطا در نشانه‌گذاری:', error);
                isSeenMarking = false;
            });
        }

        function markSingleMessageAsSeen(messageId) {
            if (!messageId) return;

            fetch('/chat/api/message/' + messageId + '/seen/', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': getCookie('csrftoken'),
                    'Content-Type': 'application/json'
                }
            })
            .then(function(response) { return response.json(); })
            .then(function(data) {
                console.log('✅ پیام', messageId, 'دیده شد');
            })
            .catch(function(error) {
                console.error('❌ خطا:', error);
            });
        }

        function updateSingleMessageSeenUI(messageId) {
            var messages = chatMessages.querySelectorAll('.message');
            for (var i = 0; i < messages.length; i++) {
                var msg = messages[i];
                if (msg.dataset.messageId == messageId) {
                    var badge = msg.querySelector('.seen-badge');
                    if (badge) {
                        badge.textContent = '✓✓';
                        badge.className = 'seen-badge seen';
                        badge.style.animation = 'none';
                        setTimeout(function() {
                            badge.style.animation = 'seen-pop 0.3s ease';
                        }, 10);
                    }
                    break;
                }
            }
        }

        function updateAllMessagesSeenUI() {
            var messages = chatMessages.querySelectorAll('.message');
            for (var i = 0; i < messages.length; i++) {
                var msg = messages[i];
                var badge = msg.querySelector('.seen-badge');
                if (badge && (badge.classList.contains('sending') || badge.textContent === '✓')) {
                    badge.textContent = '✓✓';
                    badge.className = 'seen-badge seen';
                    badge.style.animation = 'none';
                    setTimeout(function() {
                        badge.style.animation = 'seen-pop 0.3s ease';
                    }, 10 + (i * 20));
                }
            }
        }

        // ============================================================
        // افزودن پیام با نشان دیده شده
        // ============================================================
        function addMessageToUI(data, isAdmin) {
            var msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + (isAdmin ? 'sent' : 'received');

            if (data.message_id) {
                msgDiv.dataset.messageId = data.message_id;
            }

            var displayName = isAdmin ? '🛡️ ادمین (شما)' : (data.sender_name || 'کاربر');
            var time = data.timestamp ? new Date(data.timestamp).toLocaleTimeString('fa-IR') : new Date().toLocaleTimeString('fa-IR');

            var seenBadge = '';
            if (!isAdmin) {
                var isSeen = data.is_seen || false;
                var isSending = data.message_id ? false : true;
                if (isSeen) {
                    seenBadge = `<span class="seen-badge seen">✓✓</span>`;
                } else if (isSending) {
                    seenBadge = `<span class="seen-badge sending">✓</span>`;
                } else {
                    seenBadge = `<span class="seen-badge delivered">✓</span>`;
                }
            }

            var contentHTML = '';

            var messageText = data.content || data.message || '';
            if (messageText) {
                contentHTML += `<div class="message-text">${escapeHtml(messageText)}</div>`;
            }

            if (data.file_url) {
                var fileType = data.message_type || 'file';
                var fileUrl = data.file_url;
                var fileName = data.file_name || 'فایل';
                var fileSize = data.file_size || '';

                switch (fileType) {
                    case 'image':
                        contentHTML += `
                            <img src="${fileUrl}" class="message-image" onclick="window.open('${fileUrl}')" loading="lazy" />
                        `;
                        break;
                    case 'video':
                        contentHTML += `
                            <video class="message-video" controls>
                                <source src="${fileUrl}" />
                            </video>
                        `;
                        break;
                    case 'audio':
                        contentHTML += `
                            <audio class="message-audio" controls>
                                <source src="${fileUrl}" />
                            </audio>
                        `;
                        break;
                    default:
                        contentHTML += `
                            <div class="message-file" onclick="window.open('${fileUrl}')">
                                <span class="file-icon">📎</span>
                                <div class="file-info">
                                    <div class="file-name">${escapeHtml(fileName)}</div>
                                    <div class="file-size">${fileSize}</div>
                                </div>
                                <span class="file-download"><i class="fas fa-download"></i></span>
                            </div>
                        `;
                        break;
                }
            }

            msgDiv.innerHTML = `
                <div class="sender-name">${displayName}</div>
                ${contentHTML}
                <span class="time">${time} ${seenBadge}</span>
            `;

            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // ============================================================
        // انتخاب چت با نشانه‌گذاری دیده شده
        // ============================================================
        function selectChat(chatId, userId) {
            console.log('🔄 انتخاب چت:', chatId, userId);

            if (currentChatId == chatId) {
                console.log('⏭️ همین چت قبلا انتخاب شده');
                return;
            }

            currentChatId = chatId;
            currentUserId = userId;

            var allItems = document.querySelectorAll('.chat-item');
            for (var i = 0; i < allItems.length; i++) {
                allItems[i].classList.remove('active');
            }

            var selectedItem = document.querySelector('.chat-item[data-chat-id="' + chatId + '"]');
            if (selectedItem) {
                selectedItem.classList.add('active');

                // دریافت نام و موبایل
                var nameElement = selectedItem.querySelector('.chat-name');
                var name = nameElement ? nameElement.textContent.trim() : 'کاربر';
                var mobile = selectedItem.querySelector('.user-mobile');
                var mobileText = mobile ? mobile.textContent.trim() : '';

                chatUserName.textContent = name;
                chatUserMobile.textContent = mobileText;

                // آواتار هدر
                var avatarImg = selectedItem.querySelector('.avatar-small img');
                if (avatarImg) {
                    chatAvatar.innerHTML = '<img src="' + avatarImg.src + '" alt="avatar" />';
                } else {
                    var initial = name ? name.charAt(0).toUpperCase() : 'U';
                    chatAvatar.innerHTML = '<span style="font-size:20px;font-weight:700;">' + initial + '</span>';
                }

                // نمایش دکمه اطلاعات مشتری
                customerInfoBtn.style.display = 'inline-flex';
            } else {
                console.log('❌ آیتم انتخاب شده پیدا نشد');
                return;
            }

            msgInput.disabled = false;
            sendBtn.disabled = false;
            fileBtn.disabled = false;
            closeChatBtn.style.display = 'inline-flex';

            delete chatMessagesCache[chatId];
            loadChatMessages(chatId);

            setTimeout(function() {
                markChatAsSeen(chatId);
            }, 500);
        }

        // ============================================================
        // بارگذاری پیام‌های چت
        // ============================================================
        async function loadChatMessages(chatId) {
            try {
                console.log('📥 بارگذاری پیام‌های چت از سرور:', chatId);

                var response = await fetch('/chat/api/admin/chat/' + chatId + '/');

                if (!response.ok) {
                    throw new Error('HTTP error! status: ' + response.status);
                }

                var data = await response.json();
                console.log('📊 پیام‌ها:', data);

                if (data.status === 'success') {
                    chatMessagesCache[chatId] = [];

                    noChatSelected.style.display = 'none';
                    chatMessages.innerHTML = '';

                    if (data.messages && data.messages.length > 0) {
                        for (var i = 0; i < data.messages.length; i++) {
                            var msg = data.messages[i];
                            chatMessagesCache[chatId].push({
                                message_id: msg.id,
                                content: msg.content || '',
                                sender_name: msg.sender_name,
                                timestamp: msg.timestamp,
                                is_admin: msg.is_admin,
                                message_type: msg.message_type || 'text',
                                file_url: msg.file_url,
                                file_name: msg.file_name,
                                file_size: msg.file_size,
                                file_thumbnail: msg.file_thumbnail,
                                is_seen: msg.is_seen || false,
                            });
                            addMessageToUI({
                                content: msg.content || '',
                                sender_name: msg.sender_name,
                                timestamp: msg.timestamp,
                                is_admin: msg.is_admin,
                                message_type: msg.message_type || 'text',
                                file_url: msg.file_url,
                                file_name: msg.file_name,
                                file_size: msg.file_size,
                                file_thumbnail: msg.file_thumbnail,
                                is_seen: msg.is_seen || false,
                                message_id: msg.id,
                            }, msg.is_admin);
                        }
                    } else {
                        var emptyMsg = document.createElement('div');
                        emptyMsg.style.cssText = 'text-align: center; color: #999; padding: 40px; font-size: 14px;';
                        emptyMsg.innerHTML = '<i class="fas fa-comment" style="font-size:32px;display:block;margin-bottom:12px;opacity:0.3;"></i> هنوز پیامی ارسال نشده است';
                        chatMessages.appendChild(emptyMsg);
                    }

                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    console.log('✅', data.messages ? data.messages.length : 0, 'پیام بارگذاری شد');

                    setTimeout(function() {
                        markChatAsSeen(chatId);
                    }, 300);
                } else {
                    throw new Error(data.message || 'خطا در دریافت پیام‌ها');
                }
            } catch (error) {
                console.error('❌ خطا:', error);
                chatMessages.innerHTML = `
                    <div style="text-align:center;color:#dc2626;padding:40px;">
                        <i class="fas fa-exclamation-circle" style="font-size:32px;display:block;margin-bottom:12px;"></i>
                        ❌ خطا در بارگذاری پیام‌ها
                        <br>
                        <small>${error.message}</small>
                        <br>
                        <button onclick="loadChatMessages(${chatId})" style="margin-top:12px;padding:8px 20px;background:#075e54;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;">🔄 تلاش مجدد</button>
                    </div>
                `;
            }
        }

        // ============================================================
        // بارگذاری چت‌ها
        // ============================================================
        async function loadChats() {
            try {
                console.log('🔄 بارگذاری لیست چت‌ها...');
                var response = await fetch('/chat/api/admin/chats/');

                if (!response.ok) {
                    throw new Error('HTTP error! status: ' + response.status);
                }

                var data = await response.json();
                console.log('📊 داده دریافتی:', data);

                if (data.status === 'success') {
                    allChats = data.chats || [];
                    renderChatList(allChats);
                    updateUnreadCount(allChats);

                    if (currentChatId) {
                        var chatExists = allChats.some(function(chat) { return chat.id == currentChatId; });
                        if (!chatExists) {
                            clearCurrentChat();
                        }
                    }
                    statusText.textContent = allChats.length + ' چت';
                    statusDot.className = 'status-dot online';
                    statusBar.className = 'status-bar online';
                } else {
                    throw new Error('خطا در دریافت داده');
                }
            } catch (error) {
                console.error('❌ خطا در بارگذاری:', error);
                chatList.innerHTML = `
                    <div class="empty-state">
                        <div class="icon"><i class="fas fa-exclamation-circle"></i></div>
                        <p>❌ خطا در بارگذاری</p>
                        <small>${error.message}</small>
                        <button onclick="loadChats()" style="margin-top:12px;padding:8px 20px;background:#075e54;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;">🔄 تلاش مجدد</button>
                    </div>
                `;
                statusText.textContent = 'خطا در بارگذاری';
                statusDot.className = 'status-dot offline';
                statusBar.className = 'status-bar offline';
            }
        }

        function renderChatList(chats) {
            if (!chats || chats.length === 0) {
                chatList.innerHTML = `
                    <div class="empty-state">
                        <div class="icon"><i class="fas fa-comment-slash"></i></div>
                        <p>💬 هیچ چتی وجود ندارد</p>
                        <small>منتظر اولین پیام کاربران باشید</small>
                    </div>
                `;
                return;
            }

            var html = '';
            var searchTerm = searchInput ? searchInput.value.toLowerCase() : '';

            for (var i = 0; i < chats.length; i++) {
                var chat = chats[i];

                if (searchTerm && !chat.user_name.toLowerCase().includes(searchTerm) &&
                    !chat.user_mobile.includes(searchTerm)) {
                    continue;
                }

                var isActive = (currentChatId == chat.id) ? 'active' : '';
                var unreadBadgeHTML = chat.unread_count > 0 ? '<span class="unread-badge">' + chat.unread_count + '</span>' : '';
                var time = chat.last_message_time ? new Date(chat.last_message_time).toLocaleTimeString('fa-IR', {
                    hour: '2-digit',
                    minute: '2-digit'
                }) : '';
                var preview = chat.last_message && chat.last_message.length > 35 ? chat.last_message.substring(0, 35) + '...' : (chat.last_message || 'بدون پیام');

                // آواتار کوچک
                var avatarHTML = '';
                if (chat.user_avatar) {
                    avatarHTML = `<img src="${chat.user_avatar}" alt="${escapeHtml(chat.user_name)}" />`;
                } else {
                    var initial = chat.user_name ? chat.user_name.charAt(0).toUpperCase() : 'U';
                    avatarHTML = `<span style="font-weight:700;">${initial}</span>`;
                }

                // وضعیت آنلاین
                var onlineStatus = chat.is_online ? 'online' : 'offline';

                html += `
                    <div class="chat-item ` + isActive + `" data-chat-id="` + chat.id + `" data-user-id="` + chat.user_id + `">
                        <div class="chat-top">
                            <span class="chat-name">
                                <span class="avatar-small">${avatarHTML}</span>
                                <span class="online-status ${onlineStatus}"></span>
                                ` + escapeHtml(chat.user_name) + `
                            </span>
                            <span class="chat-time">` + time + `</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:6px;">
                            <span class="user-mobile">📱 ` + escapeHtml(chat.user_mobile) + `</span>
                            ` + unreadBadgeHTML + `
                        </div>
                        <div class="chat-preview">` + escapeHtml(preview) + `</div>
                    </div>
                `;
            }

            if (html === '') {
                html = `
                    <div class="empty-state">
                        <div class="icon"><i class="fas fa-search"></i></div>
                        <p>نتیجه‌ای یافت نشد</p>
                        <small>چت مورد نظر خود را جستجو کنید</small>
                    </div>
                `;
            }

            chatList.innerHTML = html;
        }

        function updateUnreadCount(chats) {
            if (!chats) return;
            var totalUnread = 0;
            for (var i = 0; i < chats.length; i++) {
                totalUnread += chats[i].unread_count || 0;
            }
            unreadBadge.textContent = totalUnread;
            if (totalUnread === 0) {
                unreadBadge.classList.add('hidden');
            } else {
                unreadBadge.classList.remove('hidden');
            }
        }

        function clearCurrentChat() {
            currentChatId = null;
            currentUserId = null;
            noChatSelected.style.display = 'flex';
            chatMessages.innerHTML = `
                <div class="no-chat-selected" id="no-chat-selected">
                    <div class="icon"><i class="fas fa-inbox"></i></div>
                    <h3>چتی را انتخاب کنید</h3>
                    <p>برای مشاهده پیام‌ها، یک چت را از لیست انتخاب کنید</p>
                </div>
            `;
            chatUserName.textContent = 'انتخاب چت';
            chatUserMobile.textContent = '';
            chatAvatar.innerHTML = '<i class="fas fa-user"></i>';
            msgInput.disabled = true;
            sendBtn.disabled = true;
            fileBtn.disabled = true;
            closeChatBtn.style.display = 'none';
            customerInfoBtn.style.display = 'none';
            clearFilePreview();
        }

                            <div class="label"><i class="fas fa-calendar-alt"></i> سن</div>
                            <div class="value">${user.age ? user.age + ' سال' : 'نامشخص'}</div>
                        </div>
                        <div class="info-item">
                            <div class="label"><i class="fas fa-store"></i> نام فروشگاه</div>
                            <div class="value">${escapeHtml(user.shop_name) || 'ثبت نشده'}</div>
                        </div>
                        <div class="info-item">
                            <div class="label"><i class="fas fa-circle"></i> وضعیت</div>
                            <div class="value">${onlineBadge}</div>
                        </div>
                        <div class="info-item" style="grid-column: span 2;">
                            <div class="label"><i class="fas fa-clock"></i> آخرین فعالیت</div>
                            <div class="value" style="font-size:14px;">${user.last_activity ? new Date(user.last_activity).toLocaleString('fa-IR') : 'نامشخص'}</div>
                        </div>
                    </div>
                </div>

                <!-- اطلاعات مالی -->
                <div class="modal-section">
                    <div class="modal-section-title"><i class="fas fa-wallet"></i> اطلاعات مالی</div>
                    <div class="finance-grid">
                        <div class="finance-card">
                            <div class="amount success">${Number(wallet.balance || 0).toLocaleString()} تومان</div>
                            <div class="label">موجودی کیف پول</div>
                        </div>
                        <div class="finance-card">
                            <div class="amount warning">${Number(wallet.frozen_balance || 0).toLocaleString()} تومان</div>
                            <div class="label">موجودی مسدود شده</div>
                        </div>
                        <div class="finance-card">
                            <div class="amount primary">${Number(wallet.total_balance || 0).toLocaleString()} تومان</div>
                            <div class="label">مجموع موجودی</div>
                        </div>
                        <div class="finance-card">
                            <div class="amount purple">${loyalty.total_points || 0}</div>
                            <div class="label">امتیازات وفاداری</div>
                        </div>
                        <div class="finance-card">
                            <div class="amount primary">${loyalty.total_coins || 0}</div>
                            <div class="label">سکه‌ها</div>
                        </div>
                        <div class="finance-card">
                            <div class="amount" style="font-size:16px;color:#d97706;">${loyalty.current_tier || 'انتخاب شده'}</div>
                            <div class="label">سطح عضویت</div>
                        </div>
                        <div class="finance-card" style="grid-column: span 2;">
                            <div class="amount success">${Number(loyalty.lifetime_purchase || 0).toLocaleString()} تومان</div>
                            <div class="label">مجموع خرید مادام‌العمر</div>
                        </div>
                    </div>
                </div>

                <!-- آدرس‌ها -->
                <div class="modal-section">
                    <div class="modal-section-title"><i class="fas fa-map-marked-alt"></i> آدرس‌های ثبت شده</div>
                    <div class="address-grid">${addressHTML}</div>
                </div>

                <!-- آمار چت -->
                <div class="modal-section">
                    <div class="modal-section-title"><i class="fas fa-comments"></i> آمار مکالمات</div>
                    <div class="finance-grid">
                        <div class="finance-card">
                            <div class="amount primary">${chat.total_messages || 0}</div>
                            <div class="label">مجموع پیام‌ها</div>
                        </div>
                        <div class="finance-card">
                            <div class="amount" style="color:#075e54;">${chat.user_messages || 0}</div>
                            <div class="label">پیام‌های کاربر</div>
                        </div>
                        <div class="finance-card">
                            <div class="amount purple">${chat.admin_messages || 0}</div>
                            <div class="label">پیام‌های ادمین</div>
                        </div>
                        <div class="finance-card">
                            <div class="amount" style="font-size:16px;color:#6b7280;">${chat.created_at ? new Date(chat.created_at).toLocaleDateString('fa-IR') : 'نامشخص'}</div>
                            <div class="label">تاریخ شروع چت</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ============================================================
        // جستجو
        // ============================================================
        if (searchInput) {
            searchInput.addEventListener('input', function() {
                renderChatList(allChats);
            });
        }

        // ============================================================
        // مدیریت فایل
        // ============================================================
        fileBtn.addEventListener('click', function() {
            fileInput.click();
        });

        fileInput.addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;

            if (file.size > 10 * 1024 * 1024) {
                showNotification('❌ حجم فایل بیشتر از 10 مگابایت است');
                fileInput.value = '';
                return;
            }

            selectedFile = file;
            selectedFileType = file.type.split('/')[0] || 'file';

            var reader = new FileReader();
            reader.onload = function(e) {
                selectedFileData = e.target.result;

                filePreviewContainer.style.display = 'block';
                previewName.textContent = file.name;
                previewSize.textContent = formatFileSize(file.size);

                if (selectedFileType === 'image') {
                    previewImage.style.display = 'block';
                    previewImage.src = e.target.result;
                    previewIcon.style.display = 'none';
                } else {
                    previewImage.style.display = 'none';
                    previewIcon.style.display = 'block';
                    var icons = {
                        'video': '🎬',
                        'audio': '🎵',
                        'pdf': '📄',
                        'zip': '📦',
                        'document': '📝'
                    };
                    previewIcon.textContent = icons[selectedFileType] || '📎';
                }
            };
            reader.readAsDataURL(file);
        });

        previewRemove.addEventListener('click', clearFilePreview);

        function clearFilePreview() {
            selectedFile = null;
            selectedFileType = 'file';
            selectedFileData = null;
            fileInput.value = '';
            filePreviewContainer.style.display = 'none';
            previewImage.src = '';
            previewImage.style.display = 'none';
            previewIcon.style.display = 'block';
            previewIcon.textContent = '📎';
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
        }

        // ============================================================
        // ارسال پیام
        // ============================================================
        function sendMessage() {
            var message = msgInput.value.trim();

            if (!message && !selectedFile) {
                msgInput.style.borderColor = '#dc2626';
                setTimeout(function() { msgInput.style.borderColor = ''; }, 2000);
                return;
            }

            if (!currentChatId) {
                showNotification('❌ لطفاً یک چت را انتخاب کنید');
                return;
            }

            if (!isConnected) {
                showNotification('❌ اتصال برقرار نیست!');
                return;
            }

            var payload = { chat_id: currentChatId };

            if (message) {
                payload.message = message;
            }

            if (selectedFile && selectedFileData) {
                payload.file = selectedFileData;
                payload.file_name = selectedFile.name;
                payload.file_type = selectedFileType;
            }

            var data = {
                content: message || '',
                sender_name: 'ادمین',
                timestamp: new Date().toISOString(),
                is_admin: true,
                message_type: selectedFile ? selectedFileType : 'text',
                file_url: selectedFile ? URL.createObjectURL(selectedFile) : null,
                file_name: selectedFile ? selectedFile.name : null,
                file_size: selectedFile ? formatFileSize(selectedFile.size) : null,
                is_seen: true,
            };
            addMessageToUI(data, true);

            if (!chatMessagesCache[currentChatId]) {
                chatMessagesCache[currentChatId] = [];
            }
            chatMessagesCache[currentChatId].push({
                content: message || '',
                sender_name: 'ادمین',
                timestamp: new Date().toISOString(),
                is_admin: true,
                message_type: selectedFile ? selectedFileType : 'text',
                file_url: selectedFile ? URL.createObjectURL(selectedFile) : null,
                file_name: selectedFile ? selectedFile.name : null,
                file_size: selectedFile ? formatFileSize(selectedFile.size) : null,
                is_seen: true,
            });

            ws.send(JSON.stringify(payload));

            msgInput.value = '';
            clearFilePreview();
            console.log('📤 پیام ارسال شد به چت:', currentChatId);
        }

        // ============================================================
        // بستن چت
        // ============================================================
        async function closeCurrentChat() {
            if (!currentChatId) return;

            if (!confirm('آیا مطمئن هستید که می‌خواهید این چت را ببندید؟')) return;

            try {
                var response = await fetch('/chat/api/admin/chat/' + currentChatId + '/close/', {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken'),
                        'Content-Type': 'application/json'
                    }
                });

                var data = await response.json();
                if (data.status === 'success') {
                    showNotification('✅ چت با موفقیت بسته شد');
                    clearCurrentChat();
                    loadChats();
                } else {
                    showNotification('❌ خطا: ' + (data.message || 'خطای ناشناخته'));
                }
            } catch (error) {
                console.error('❌ خطا:', error);
                showNotification('❌ خطا در بستن چت');
            }
        }

        // ============================================================
        // صدا
        // ============================================================
        function playNotificationSound() {
            try {
                var AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) {
                    var ctx = new AudioContext();
                    var oscillator = ctx.createOscillator();
                    var gainNode = ctx.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    oscillator.frequency.value = 800;
                    oscillator.type = 'sine';
                    gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    oscillator.start();
                    oscillator.stop(ctx.currentTime + 0.3);
                }
            } catch (e) {
                console.log('🔇 صدا پخش نشد');
            }
        }

        // ============================================================
        // توابع کمکی
        // ============================================================
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getCookie(name) {
            var cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                var cookies = document.cookie.split(';');
                for (var i = 0; i < cookies.length; i++) {
                    var cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function showNotification(text) {
            var oldNotif = document.querySelector('.notification');
            if (oldNotif) oldNotif.remove();

            var notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = text;
            document.body.appendChild(notif);

            setTimeout(function() {
                notif.style.opacity = '0';
                notif.style.transition = 'opacity 0.5s';
                setTimeout(function() { notif.remove(); }, 500);
            }, 3000);
        }

        // ============================================================
        // رویدادها
        // ============================================================
        chatList.addEventListener('click', function(e) {
            var chatItem = e.target.closest('.chat-item');
            if (!chatItem) return;

            var chatId = chatItem.dataset.chatId;
            var userId = chatItem.dataset.userId;

            if (chatId && userId) {
                var chatIdNum = parseInt(chatId);
                if (!isNaN(chatIdNum)) {
                    selectChat(chatIdNum, userId);
                }
            }
        });

        sendBtn.onclick = sendMessage;
        closeChatBtn.onclick = closeCurrentChat;
        refreshBtn.onclick = function() {
            loadChats();
            if (currentChatId) {
                loadChatMessages(currentChatId);
            }
        };

        customerInfoBtn.onclick = showCustomerInfo;

        modalCloseBtn.onclick = function() {
            customerModal.classList.remove('active');
        };
        customerModal.addEventListener('click', function(e) {
            if (e.target === customerModal) {
                customerModal.classList.remove('active');
            }
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && customerModal.classList.contains('active')) {
                customerModal.classList.remove('active');
            }
        });

        msgInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        msgInput.addEventListener('input', function() {
            if (isConnected && ws && currentChatId) {
                clearTimeout(typingTimeout);
                ws.send(JSON.stringify({
                    type: 'typing',
                    is_typing: true,
                    chat_id: currentChatId
                }));
                typingTimeout = setTimeout(function() {
                    if (ws && isConnected) {
                        ws.send(JSON.stringify({
                            type: 'typing',
                            is_typing: false,
                            chat_id: currentChatId
                        }));
                    }
                }, 2000);
            }
        });

        // ============================================================
        // بارگذاری اولیه
        // ============================================================
        console.log('🚀 داشبورد ادمین بارگذاری شد');

        connectWebSocket();
        loadChats();

        setInterval(function() {
            if (document.visibilityState === 'visible') {
                loadChats();
            }
        }, 15000);
    </script>
</body>
</html>
